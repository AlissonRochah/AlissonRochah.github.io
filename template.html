<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="style/theme.js"></script>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/template.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { getFirestore, collection, setDoc, getDocs, deleteDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKYoUaxhOX1pagezUTTDbwWVg5ktcSEcY",
            authDomain: "templatemaster-a2d6e.firebaseapp.com",
            projectId: "templatemaster-a2d6e",
            storageBucket: "templatemaster-a2d6e.firebasestorage.app",
            messagingSenderId: "208432538664",
            appId: "1:208432538664:web:10a29a55efbb824ae1411d",
            measurementId: "G-LLVT6XW024"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        let currentUserId = null;
        let editingTemplateId = null;
        let userCategories = [];
        let allTemplates = [];
        let aiApiUrl = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById("user-email").innerText = user.email;
                await loadCategories(user.uid);
                // Load AI config first so templates can generate summaries
                try {
                    const globalRef = doc(db, "settings", "global");
                    const globalSnap = await getDoc(globalRef);
                    if (globalSnap.exists()) {
                        aiApiUrl = globalSnap.data().aiApiUrl || "";
                    }
                } catch (e) {}
                await loadTemplates(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        // Load categories from settings
        async function loadCategories(userId) {
            try {
                const settingsRef = doc(db, "settings", userId);
                const snap = await getDoc(settingsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (data.categories) {
                        userCategories = data.categories;
                    }
                    if (data.aiEnabled) {
                        document.getElementById("ai-nav-link").style.display = "";
                    }
                }
            } catch (e) {
                console.error("Error loading categories:", e);
            }
            populateCategorySelect();
        }

        function populateCategorySelect() {
            const select = document.getElementById("template-category");
            select.innerHTML = '<option value="">No category</option>';
            userCategories.forEach(cat => {
                const opt = document.createElement("option");
                opt.value = cat;
                opt.textContent = cat;
                select.appendChild(opt);
            });
        }

        // Save template (add or edit)
        window.saveTemplate = async function () {
            const nameInput = document.getElementById("template-name");
            const descInput = document.getElementById("template-description");
            const categorySelect = document.getElementById("template-category");
            const name = nameInput.value.trim();
            const description = descInput.value.trim();
            const category = categorySelect.value;
            const user = auth.currentUser;

            if (!name || !description) {
                showToast("Please fill in name and content.", "error");
                return;
            }

            if (user) {
                if (editingTemplateId && editingTemplateId !== name) {
                    const oldRef = doc(doc(db, "templates", user.uid), "userTemplates", editingTemplateId);
                    await deleteDoc(oldRef);
                }

                const userDocRef = doc(db, "templates", user.uid);
                const userTemplatesRef = doc(collection(userDocRef, "userTemplates"), name);

                const formattedDescription = description.replace(/\n/g, "\\n");

                const existingTemplate = allTemplates.find(t => t.id === editingTemplateId);
                const order = existingTemplate ? existingTemplate.order : allTemplates.length;

                await setDoc(userTemplatesRef, {
                    name: name,
                    description: formattedDescription,
                    category: category || "",
                    order: order
                });

                nameInput.value = "";
                descInput.value = "";
                categorySelect.value = "";
                editingTemplateId = null;
                closeModal();
                showToast("Template saved!");

                // Generate AI summary in background
                generateAiSummary(user.uid, name, name, description);
                loadTemplates(user.uid);
            }
        };

        // Load templates
        async function loadTemplates(userId) {
            const userDocRef = doc(db, "templates", userId);
            const userTemplatesCollection = collection(userDocRef, "userTemplates");
            const querySnapshot = await getDocs(userTemplatesCollection);

            allTemplates = [];
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                allTemplates.push({ id: docSnap.id, order: data.order ?? 999999, ...data });
            });

            // Assign order to templates that don't have one yet
            allTemplates.sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));
            let needsOrderUpdate = false;
            allTemplates.forEach((t, i) => {
                if (t.order === 999999) {
                    t.order = i;
                    needsOrderUpdate = true;
                }
            });
            if (needsOrderUpdate) {
                for (const t of allTemplates) {
                    const ref = doc(doc(db, "templates", userId), "userTemplates", t.id);
                    await setDoc(ref, { order: t.order }, { merge: true });
                }
            }

            renderTemplates(userId);

            // Generate AI summaries for templates that don't have one
            generateMissingSummaries(userId);
        }

        async function generateMissingSummaries(userId) {
            if (!aiApiUrl) return;
            const missing = allTemplates.filter(t => !t.aiSummary);
            if (missing.length === 0) return;
            for (const t of missing) {
                const content = (t.description || "").replace(/\\n/g, "\n");
                await generateAiSummary(userId, t.id, t.name, content);
            }
        }

        function renderTemplates(userId) {
            const list = document.getElementById("template-list");
            const emptyState = document.getElementById("empty-state");
            const counter = document.getElementById("template-count");
            const query = document.getElementById("search-input").value.toLowerCase();

            list.innerHTML = "";

            let filtered = allTemplates.filter(t => t.name.toLowerCase().includes(query));
            filtered.sort((a, b) => a.order - b.order);

            counter.textContent = allTemplates.length + " template" + (allTemplates.length !== 1 ? "s" : "");

            if (allTemplates.length === 0) {
                emptyState.style.display = "flex";
                return;
            }
            emptyState.style.display = "none";

            filtered.forEach((data, idx) => {
                const formattedDescription = data.description.replace(/\\n/g, "<br>");
                const categoryBadge = data.category
                    ? `<span class="category-badge">${data.category}</span>`
                    : '';
                const aiBadge = data.aiSummary
                    ? `<span class="category-badge ai-badge" onclick="event.stopPropagation(); showSummary('${data.aiSummary.replace(/'/g, "\\'").replace(/"/g, '&quot;')}')">AI</span>`
                    : '';

                const item = document.createElement("div");
                item.className = "template-card";
                item.draggable = true;
                item.dataset.id = data.id;
                item.ondragstart = (e) => onDragStart(e, data.id);
                item.ondragend = onDragEnd;
                item.ondragover = onDragOver;
                item.ondrop = (e) => onDropTemplate(e, data.id);
                item.ontouchstart = (e) => {
                    if (e.target.closest(".drag-handle")) onTouchDragStart(e, data.id);
                };
                item.innerHTML = `
                    <div class="template-card-header">
                        <div class="template-card-title-row">
                            <span class="drag-handle" title="Drag to reorder">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg>
                            </span>
                            <h3 class="template-card-title">${data.name}</h3>
                            ${categoryBadge}
                            ${aiBadge}
                        </div>
                        <div class="template-card-actions">
                            <button onclick="editTemplate('${data.id}')" class="btn-icon btn-edit" title="Edit template">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                            </button>
                            <button onclick="confirmDelete('${userId}', '${data.id}')" class="btn-icon btn-delete" title="Delete template">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                    <p class="template-card-desc">${formattedDescription}</p>
                `;
                list.appendChild(item);
            });
        }

        // Drag and drop reordering
        let draggedId = null;

        window.onDragStart = function (e, templateId) {
            draggedId = templateId;
            e.dataTransfer.effectAllowed = "move";
            e.target.closest(".template-card").classList.add("dragging");
        };

        window.onDragEnd = function (e) {
            draggedId = null;
            document.querySelectorAll(".template-card").forEach(c => {
                c.classList.remove("dragging", "drag-over");
            });
        };

        window.onDragOver = function (e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            const card = e.target.closest(".template-card");
            if (card) {
                document.querySelectorAll(".template-card.drag-over").forEach(c => c.classList.remove("drag-over"));
                card.classList.add("drag-over");
            }
        };

        window.onDropTemplate = async function (e, targetId) {
            e.preventDefault();
            if (!draggedId || draggedId === targetId) return;

            const sorted = [...allTemplates].sort((a, b) => a.order - b.order);
            const fromIdx = sorted.findIndex(t => t.id === draggedId);
            const toIdx = sorted.findIndex(t => t.id === targetId);
            if (fromIdx === -1 || toIdx === -1) return;

            const [moved] = sorted.splice(fromIdx, 1);
            sorted.splice(toIdx, 0, moved);

            sorted.forEach((t, i) => t.order = i);
            renderTemplates(currentUserId);

            for (const t of sorted) {
                const ref = doc(doc(db, "templates", currentUserId), "userTemplates", t.id);
                await setDoc(ref, { order: t.order }, { merge: true });
            }
        };

        // Touch drag support
        let touchDragId = null;
        let touchClone = null;

        window.onTouchDragStart = function (e, templateId) {
            const touch = e.touches[0];
            touchDragId = templateId;

            const card = e.target.closest(".template-card");
            touchClone = card.cloneNode(true);
            touchClone.className = "template-card drag-clone";
            touchClone.style.width = card.offsetWidth + "px";
            document.body.appendChild(touchClone);
            touchClone.style.top = touch.clientY - 20 + "px";
            touchClone.style.left = card.getBoundingClientRect().left + "px";

            card.classList.add("dragging");
            e.preventDefault();
        };

        document.addEventListener("touchmove", function (e) {
            if (!touchDragId || !touchClone) return;
            const touch = e.touches[0];
            touchClone.style.top = touch.clientY - 20 + "px";

            document.querySelectorAll(".template-card.drag-over").forEach(c => c.classList.remove("drag-over"));
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            if (el) {
                const card = el.closest(".template-card:not(.drag-clone)");
                if (card) card.classList.add("drag-over");
            }
            e.preventDefault();
        }, { passive: false });

        document.addEventListener("touchend", async function (e) {
            if (!touchDragId) return;

            if (touchClone) {
                touchClone.remove();
                touchClone = null;
            }

            const touch = e.changedTouches[0];
            const el = document.elementFromPoint(touch.clientX, touch.clientY);
            let targetId = null;
            if (el) {
                const card = el.closest(".template-card");
                if (card && card.dataset.id) targetId = card.dataset.id;
            }

            document.querySelectorAll(".template-card").forEach(c => {
                c.classList.remove("dragging", "drag-over");
            });

            if (targetId && targetId !== touchDragId) {
                const sorted = [...allTemplates].sort((a, b) => a.order - b.order);
                const fromIdx = sorted.findIndex(t => t.id === touchDragId);
                const toIdx = sorted.findIndex(t => t.id === targetId);
                if (fromIdx !== -1 && toIdx !== -1) {
                    const [moved] = sorted.splice(fromIdx, 1);
                    sorted.splice(toIdx, 0, moved);
                    sorted.forEach((t, i) => t.order = i);
                    renderTemplates(currentUserId);
                    for (const t of sorted) {
                        const ref = doc(doc(db, "templates", currentUserId), "userTemplates", t.id);
                        await setDoc(ref, { order: t.order }, { merge: true });
                    }
                }
            }

            touchDragId = null;
        });

        // Edit template
        window.editTemplate = async function (templateId) {
            const user = auth.currentUser;
            if (!user) return;

            const userDocRef = doc(db, "templates", user.uid);
            const templateRef = doc(userDocRef, "userTemplates", templateId);
            const snap = await getDoc(templateRef);

            if (snap.exists()) {
                const data = snap.data();
                editingTemplateId = templateId;

                document.getElementById("template-name").value = data.name;
                document.getElementById("template-description").value = data.description.replace(/\\n/g, "\n");
                document.getElementById("template-category").value = data.category || "";
                document.getElementById("modal-title").textContent = "Edit Template";
                document.getElementById("modal-save-btn").textContent = "Save Changes";
                document.getElementById("add-modal").classList.add("active");
                document.getElementById("template-name").focus();
            }
        };

        // Delete with confirmation
        window.confirmDelete = function (userId, templateName) {
            const overlay = document.getElementById("confirm-overlay");
            const confirmBtn = document.getElementById("confirm-delete-btn");
            const cancelBtn = document.getElementById("cancel-delete-btn");

            overlay.classList.add("active");

            confirmBtn.onclick = async function () {
                const userDocRef = doc(db, "templates", userId);
                const templateRef = doc(userDocRef, "userTemplates", templateName);
                await deleteDoc(templateRef);
                overlay.classList.remove("active");
                showToast("Template deleted.");
                loadTemplates(userId);
            };

            cancelBtn.onclick = function () {
                overlay.classList.remove("active");
            };
        };

        // Modal controls
        window.openModal = function () {
            editingTemplateId = null;
            document.getElementById("template-name").value = "";
            document.getElementById("template-description").value = "";
            document.getElementById("template-category").value = "";
            document.getElementById("modal-title").textContent = "New Template";
            document.getElementById("modal-save-btn").textContent = "Save Template";
            document.getElementById("add-modal").classList.add("active");
            document.getElementById("template-name").focus();
        };

        window.closeModal = function () {
            document.getElementById("add-modal").classList.remove("active");
            editingTemplateId = null;
        };

        window.filterTemplates = function () {
            renderTemplates(currentUserId);
        };

        // Export templates
        window.exportTemplates = function () {
            if (allTemplates.length === 0) {
                showToast("No templates to export.", "error");
                return;
            }
            const data = allTemplates.map(t => ({
                name: t.name,
                description: t.description,
                category: t.category || ""
            }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "templates.json";
            a.click();
            URL.revokeObjectURL(url);
            showToast("Templates exported!");
        };

        // Import templates
        window.triggerImport = function () {
            document.getElementById("import-file").click();
        };

        window.handleImport = async function (event) {
            const file = event.target.files[0];
            if (!file) return;
            const user = auth.currentUser;
            if (!user) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!Array.isArray(data)) {
                    showToast("Invalid file format.", "error");
                    return;
                }

                let count = 0;
                for (const t of data) {
                    if (!t.name || !t.description) continue;
                    const userDocRef = doc(db, "templates", user.uid);
                    const ref = doc(collection(userDocRef, "userTemplates"), t.name);
                    await setDoc(ref, {
                        name: t.name,
                        description: t.description,
                        category: t.category || ""
                    });
                    count++;
                }

                showToast(count + " templates imported!");
                loadTemplates(user.uid);
            } catch (e) {
                console.error("Import error:", e);
                showToast("Error importing: " + e.message, "error");
            }

            event.target.value = "";
        };

        window.showSummary = function (text) {
            const toast = document.getElementById("toast");
            toast.textContent = "AI: " + text;
            toast.className = "toast success show";
            setTimeout(() => toast.classList.remove("show"), 5000);
        };

        // Generate AI summary for a template (runs in background)
        async function generateAiSummary(userId, templateId, name, content) {
            if (!aiApiUrl) return;
            try {
                const res = await fetch(aiApiUrl + "/v1/chat/completions", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "gemma3:12b",
                        messages: [
                            {
                                role: "system",
                                content: "Summarize this vacation rental response template in one short sentence. Describe WHEN to use it — what guest situation or question triggers this template. Be specific. Example: 'Guest asks about wifi password or network name' or 'Guest reports wifi or internet not working'. Reply with ONLY the summary, nothing else."
                            },
                            {
                                role: "user",
                                content: "Template name: " + name + "\n\nTemplate content:\n" + content
                            }
                        ],
                        temperature: 0
                    })
                });
                if (!res.ok) return;
                const data = await res.json();
                const summary = data.choices?.[0]?.message?.content || "";
                if (summary) {
                    const userDocRef = doc(db, "templates", userId);
                    const ref = doc(collection(userDocRef, "userTemplates"), templateId);
                    await setDoc(ref, { aiSummary: summary }, { merge: true });
                }
            } catch (e) {
                console.error("AI summary error:", e);
            }
        }

        // Toast notification
        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "toast " + type + " show";
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        window.logout = function () {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        };
    </script>
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <a href="messages.html" class="header-logo">
                <img src="img/MasterLogo.jpg" alt="Logo">
            </a>
            <nav class="header-nav">
                <a href="template.html" class="nav-link active">Templates</a>
                <a href="messages.html" class="nav-link">Messages</a>
                <a href="ai.html" class="nav-link" id="ai-nav-link" style="display:none">AI</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="user-email" class="header-email"></span>
            <button onclick="window.logout()" class="btn btn-sm btn-outline">Sign Out</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search templates..." oninput="filterTemplates()">
            </div>
            <button onclick="exportTemplates()" class="btn btn-outline btn-sm" title="Export templates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button onclick="triggerImport()" class="btn btn-outline btn-sm" title="Import templates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
            <button onclick="openModal()" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
            </button>
        </div>
        <p id="template-count" class="template-count"></p>

        <!-- Template List -->
        <div id="template-list" class="template-list"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>No templates yet</p>
            <button onclick="openModal()" class="btn btn-primary btn-sm">Create your first template</button>
        </div>
    </main>

    <!-- Add/Edit Template Modal -->
    <div id="add-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">New Template</h2>
                <button onclick="closeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row-modal">
                    <div class="form-group" style="flex:2">
                        <label for="template-name">Template Name</label>
                        <input type="text" id="template-name" placeholder="e.g. Check-in Instructions">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label for="template-category">Category</label>
                        <select id="template-category" class="form-select">
                            <option value="">No category</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="template-description">Template Content</label>
                    <textarea id="template-description" placeholder="Write your template message here..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
                <button onclick="saveTemplate()" id="modal-save-btn" class="btn btn-primary">Save Template</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div id="confirm-overlay" class="modal-overlay">
