<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Templates - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="js/theme.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/template.css">

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { showToast } from "./js/toast.js";
        import { renderHeader } from "./js/nav.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { collection, setDoc, getDocs, deleteDoc, doc, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        renderHeader("templates");

        let currentUserId = null;
        let editingTemplateId = null;
        let userCategories = [];
        let allTemplates = [];
        let currentSort = "manual";       // "manual" | "alpha" | "category"
        let currentFilter = "all";        // "all" | category name

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById("user-email").innerText = user.email;
                await loadCategories(user.uid);
                await loadTemplates(user.uid);

                // If we arrived via the "+" shortcut from messages.html,
                // auto-open the New Template modal.
                if (new URLSearchParams(window.location.search).get("new") === "1") {
                    window.openModal();
                }
            } else {
                window.location.href = "index.html";
            }
        });

        // Load categories from settings. Stored shape is { name, slug }
        // per entry now; legacy plain strings are upgraded inline.
        async function loadCategories(userId) {
            try {
                const settingsRef = doc(db, "settings", userId);
                const snap = await getDoc(settingsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    if (Array.isArray(data.categories)) {
                        userCategories = data.categories.map((c) =>
                            typeof c === "string"
                                ? { name: c, slug: "" }
                                : { name: c && c.name || "", slug: c && c.slug || "" }
                        ).filter((c) => c.name);
                    }
                }
            } catch (e) {
                console.error("Error loading categories:", e);
            }
            populateCategorySelect();
        }

        function populateCategorySelect() {
            const select = document.getElementById("template-category");
            select.innerHTML = '<option value="">No category</option>';
            userCategories.forEach((cat) => {
                const opt = document.createElement("option");
                opt.value = cat.name;
                opt.textContent = cat.slug ? `${cat.slug} - ${cat.name}` : cat.name;
                select.appendChild(opt);
            });
        }

        // Save template (add or edit)
        window.saveTemplate = async function () {
            const nameInput = document.getElementById("template-name");
            const descInput = document.getElementById("template-description");
            const categorySelect = document.getElementById("template-category");
            const aliasInput = document.getElementById("template-alias");
            const name = nameInput.value.trim();
            const description = descInput.value.trim();
            const category = categorySelect.value;
            const alias = (aliasInput.value || "").trim().toLowerCase();
            const user = auth.currentUser;

            if (!name || !description) {
                showToast("Please fill in name and content.", "error");
                return;
            }

            if (user) {
                if (editingTemplateId && editingTemplateId !== name) {
                    const oldRef = doc(doc(db, "templates", user.uid), "userTemplates", editingTemplateId);
                    await deleteDoc(oldRef);
                }

                const userDocRef = doc(db, "templates", user.uid);
                const userTemplatesRef = doc(collection(userDocRef, "userTemplates"), name);

                const formattedDescription = description.replace(/\n/g, "\\n");

                const existingTemplate = allTemplates.find(t => t.id === editingTemplateId);
                const order = existingTemplate ? existingTemplate.order : allTemplates.length;

                const templateData = {
                    name: name,
                    description: formattedDescription,
                    category: category || "",
                    alias: alias || "",
                    order: order
                };
                await setDoc(userTemplatesRef, templateData);

                const wasEditing = !!editingTemplateId;
                nameInput.value = "";
                descInput.value = "";
                categorySelect.value = "";
                aliasInput.value = "";
                editingTemplateId = null;
                closeModal();
                showToast(wasEditing ? "Template updated!" : "Template added!");
                loadTemplates(user.uid);
            }
        };

        // Load templates
        async function loadTemplates(userId) {
            const userDocRef = doc(db, "templates", userId);
            const userTemplatesCollection = collection(userDocRef, "userTemplates");
            const querySnapshot = await getDocs(userTemplatesCollection);

            allTemplates = [];
            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                if (!data.name) return;
                allTemplates.push({ id: docSnap.id, order: data.order ?? 999999, ...data });
            });

            // Backfill missing order values once
            allTemplates.sort((a, b) => a.order - b.order || a.name.localeCompare(b.name));
            let needsOrderUpdate = false;
            allTemplates.forEach((t, i) => {
                if (t.order === 999999) { t.order = i; needsOrderUpdate = true; }
            });

            renderCategoryChips();
            renderTemplates();

            if (needsOrderUpdate) {
                try {
                    for (const t of allTemplates) {
                        const ref = doc(doc(db, "templates", userId), "userTemplates", t.id);
                        await setDoc(ref, { order: t.order }, { merge: true });
                    }
                } catch (e) {
                    console.error("Error updating order:", e);
                }
            }
        }

        // ========== FILTER + SORT ==========

        function renderCategoryChips() {
            const host = document.getElementById("category-chips");
            const slugByName = {};
            userCategories.forEach((c) => { if (c.slug) slugByName[c.name] = c.slug; });
            const usedCats = [...new Set(allTemplates.map(t => t.category).filter(Boolean))].sort();
            const chips = [
                `<button class="filter-chip ${currentFilter === "all" ? "active" : ""}" onclick="setFilter('all')">All</button>`,
                ...usedCats.map((c) => {
                    const slug = slugByName[c];
                    const label = slug ? `${slug} - ${c}` : c;
                    return `<button class="filter-chip ${currentFilter === c ? "active" : ""}" onclick="setFilter('${c.replace(/'/g, "\\'")}')">${label}</button>`;
                }),
            ];
            host.innerHTML = chips.join("");
        }

        window.setFilter = function (cat) {
            currentFilter = cat;
            renderCategoryChips();
            renderTemplates();
        };

        window.setSort = function (mode) {
            if (currentSort === mode) return;
            currentSort = mode;
            document.querySelectorAll(".sort-btn").forEach(b => {
                b.classList.toggle("active", b.dataset.sort === mode);
            });
            // Show "Apply this order" only when in a non-manual preview
            const applyBtn = document.getElementById("apply-sort-btn");
            applyBtn.style.display = mode === "manual" ? "none" : "";
            renderTemplates();
        };

        function templateCardHTML(data) {
            const formattedDescription = data.description.replace(/\\n/g, "<br>");
            const categoryBadge = data.category ? `<span class="category-badge">${data.category}</span>` : '';
            const aliasBadge = data.alias ? `<span class="alias-badge">/${data.alias}</span>` : '';
            const handle = currentSort === "manual"
                ? `<span class="drag-handle" title="Drag to reorder"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/></svg></span>`
                : '';
            return `
                <div class="template-card-header">
                    <div class="template-card-title-row">
                        ${handle}
                        <h3 class="template-card-title">${data.name}</h3>
                        ${aliasBadge}
                        ${categoryBadge}
                    </div>
                    <div class="template-card-actions">
                        <button onclick="editTemplate('${data.id}')" class="btn-icon btn-edit" title="Edit template">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                        </button>
                        <button onclick="confirmDelete('${currentUserId}', '${data.id}')" class="btn-icon btn-delete" title="Delete template">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                    </div>
                </div>
                <p class="template-card-desc">${formattedDescription}</p>
            `;
        }

        function buildCard(data) {
            const item = document.createElement("div");
            item.className = "template-card";
            item.dataset.id = data.id;
            item.innerHTML = templateCardHTML(data);
            return item;
        }

        function renderTemplates() {
            const list = document.getElementById("template-list");
            const emptyState = document.getElementById("empty-state");
            const counter = document.getElementById("template-count");
            const query = document.getElementById("search-input").value.toLowerCase();

            list.innerHTML = "";
            list.classList.toggle("manual-mode", currentSort === "manual");

            counter.textContent = allTemplates.length + " template" + (allTemplates.length !== 1 ? "s" : "");

            if (allTemplates.length === 0) {
                emptyState.style.display = "flex";
                return;
            }
            emptyState.style.display = "none";

            let visible = allTemplates.filter(t => {
                if (query && !t.name.toLowerCase().includes(query)) return false;
                if (currentFilter !== "all" && (t.category || "") !== currentFilter) return false;
                return true;
            });

            if (currentSort === "manual") {
                visible.sort((a, b) => a.order - b.order);
                visible.forEach(t => list.appendChild(buildCard(t)));
            } else if (currentSort === "alpha") {
                visible.sort((a, b) => a.name.localeCompare(b.name));
                visible.forEach(t => list.appendChild(buildCard(t)));
            } else if (currentSort === "category") {
                const groups = new Map();
                visible.forEach(t => {
                    const key = t.category || "Uncategorized";
                    if (!groups.has(key)) groups.set(key, []);
                    groups.get(key).push(t);
                });
                [...groups.keys()].sort((a, b) => {
                    if (a === "Uncategorized") return 1;
                    if (b === "Uncategorized") return -1;
                    return a.localeCompare(b);
                }).forEach(key => {
                    const header = document.createElement("div");
                    header.className = "group-header";
                    header.textContent = key;
                    list.appendChild(header);
                    groups.get(key).sort((a, b) => a.name.localeCompare(b.name)).forEach(t => list.appendChild(buildCard(t)));
                });
            }
        }

        // ========== DRAG & DROP (pointer-based, manual mode only) ==========

        let dragState = null; // { id, startY, ghost, indicator }

        document.getElementById("template-list").addEventListener("pointerdown", (e) => {
            if (currentSort !== "manual") return;
            // Don't start drag if user clicked an action button (edit/delete) or its icon
            if (e.target.closest("button")) return;
            const card = e.target.closest(".template-card");
            if (!card) return;
            // Only react to primary button (left mouse / single touch)
            if (e.button !== undefined && e.button !== 0) return;
            e.preventDefault();
            startDrag(card, e);
        });

        function startDrag(card, e) {
            const rect = card.getBoundingClientRect();
            const ghost = card.cloneNode(true);
            ghost.classList.add("drag-ghost");
            ghost.style.width = rect.width + "px";
            ghost.style.left = rect.left + "px";
            ghost.style.top = rect.top + "px";
            document.body.appendChild(ghost);

            const indicator = document.createElement("div");
            indicator.className = "drag-indicator";
            document.body.appendChild(indicator);

            card.classList.add("dragging");

            dragState = {
                id: card.dataset.id,
                offsetY: e.clientY - rect.top,
                ghost,
                indicator,
                targetIndex: null,
            };

            try { card.setPointerCapture?.(e.pointerId); } catch (_) {}
            document.addEventListener("pointermove", onDragMove);
            document.addEventListener("pointerup", onDragEnd, { once: true });
            document.addEventListener("pointercancel", onDragEnd, { once: true });
        }

        function onDragMove(e) {
            if (!dragState) return;
            dragState.ghost.style.top = (e.clientY - dragState.offsetY) + "px";

            const list = document.getElementById("template-list");
            const cards = [...list.querySelectorAll(".template-card:not(.dragging)")];
            if (cards.length === 0) {
                dragState.indicator.style.display = "none";
                dragState.targetIndex = 0;
                return;
            }

            // Find which card the pointer is over (or after)
            let insertBefore = null;
            for (const c of cards) {
                const r = c.getBoundingClientRect();
                if (e.clientY < r.top + r.height / 2) { insertBefore = c; break; }
            }

            const listRect = list.getBoundingClientRect();
            const ind = dragState.indicator;
            ind.style.display = "block";
            ind.style.left = listRect.left + "px";
            ind.style.width = listRect.width + "px";

            if (insertBefore) {
                const r = insertBefore.getBoundingClientRect();
                ind.style.top = (r.top - 5) + "px";
                dragState.targetIndex = cards.indexOf(insertBefore);
            } else {
                const last = cards[cards.length - 1].getBoundingClientRect();
                ind.style.top = (last.bottom + 1) + "px";
                dragState.targetIndex = cards.length;
            }
        }

        function onDragEnd() {
            document.removeEventListener("pointermove", onDragMove);
            if (!dragState) return;

            const { id, ghost, indicator, targetIndex } = dragState;
            ghost.remove();
            indicator.remove();
            document.querySelector(".template-card.dragging")?.classList.remove("dragging");
            dragState = null;

            if (targetIndex == null) return;

            // Compute new visible-order splice, then merge with full list.
            // targetIndex was computed against cards excluding the dragging one,
            // which equals visibleIds after we remove the dragged id — so use it as-is.
            const list = document.getElementById("template-list");
            const visibleIds = [...list.querySelectorAll(".template-card")].map(c => c.dataset.id);
            const fromIdx = visibleIds.indexOf(id);
            if (fromIdx === -1) return;
            visibleIds.splice(fromIdx, 1);
            visibleIds.splice(targetIndex, 0, id);

            // Merge visible reorder into the full list — hidden (filtered) items keep their
            // relative spots; visible items take the new sequence.
            const baseIds = [...allTemplates].sort((a, b) => a.order - b.order).map(t => t.id);
            const visibleSet = new Set(visibleIds);
            const visibleQueue = [...visibleIds];
            const newOrder = baseIds.map(origId => visibleSet.has(origId) ? visibleQueue.shift() : origId);

            // Skip if nothing actually changed
            if (newOrder.join("|") === baseIds.join("|")) {
                renderTemplates();
                return;
            }

            // Compute which templates actually need a write (order changed)
            const oldOrderById = new Map(allTemplates.map(t => [t.id, t.order]));
            const changes = [];
            newOrder.forEach((id, i) => {
                if (oldOrderById.get(id) !== i) changes.push({ id, order: i });
                const t = allTemplates.find(t => t.id === id);
                if (t) t.order = i;
            });
            renderTemplates();
            persistOrderChanges(changes);
        }

        async function persistOrderChanges(changes) {
            if (changes.length === 0) return;
            try {
                const batch = writeBatch(db);
                const userDocRef = doc(db, "templates", currentUserId);
                for (const c of changes) {
                    batch.set(doc(userDocRef, "userTemplates", c.id), { order: c.order }, { merge: true });
                }
                await batch.commit();
                showToast("Order saved");
            } catch (e) {
                console.error("Save order error:", e);
                showToast("Failed to save order: " + e.message, "error");
            }
        }

        // ========== APPLY SORT (write current view as the new order) ==========

        window.applyCurrentSort = async function () {
            if (currentSort === "manual") return;

            const list = document.getElementById("template-list");
            const visibleIds = [...list.querySelectorAll(".template-card")].map(c => c.dataset.id);
            if (visibleIds.length === 0) return;

            // Merge into the full id list so filtered-out items keep their spots
            const baseIds = [...allTemplates].sort((a, b) => a.order - b.order).map(t => t.id);
            const visibleSet = new Set(visibleIds);
            const visibleQueue = [...visibleIds];
            const newOrder = baseIds.map(origId => visibleSet.has(origId) ? visibleQueue.shift() : origId);

            const btn = document.getElementById("apply-sort-btn");
            btn.disabled = true;
            btn.textContent = "Applying...";
            try {
                const batch = writeBatch(db);
                const userDocRef = doc(db, "templates", currentUserId);
                const oldOrderById = new Map(allTemplates.map(t => [t.id, t.order]));
                let touched = 0;
                newOrder.forEach((id, i) => {
                    if (oldOrderById.get(id) !== i) {
                        batch.set(doc(userDocRef, "userTemplates", id), { order: i }, { merge: true });
                        touched++;
                    }
                    const t = allTemplates.find(t => t.id === id);
                    if (t) t.order = i;
                });
                if (touched > 0) await batch.commit();
                showToast("Order applied — also visible in Messages");
                setSort("manual");
            } catch (e) {
                console.error("Apply sort error:", e);
                showToast("Failed to apply: " + e.message, "error");
            } finally {
                btn.disabled = false;
                btn.textContent = "Apply this order";
            }
        };

        // Edit template
        window.editTemplate = async function (templateId) {
            const user = auth.currentUser;
            if (!user) return;

            const userDocRef = doc(db, "templates", user.uid);
            const templateRef = doc(userDocRef, "userTemplates", templateId);
            const snap = await getDoc(templateRef);

            if (snap.exists()) {
                const data = snap.data();
                editingTemplateId = templateId;

                document.getElementById("template-name").value = data.name;
                document.getElementById("template-description").value = data.description.replace(/\\n/g, "\n");
                document.getElementById("template-category").value = data.category || "";
                document.getElementById("template-alias").value = data.alias || "";
                document.getElementById("modal-title").textContent = "Edit Template";
                document.getElementById("modal-save-btn").textContent = "Save Changes";
                document.getElementById("add-modal").classList.add("active");
                document.getElementById("template-name").focus();
            }
        };

        // Delete with confirmation
        window.confirmDelete = function (userId, templateName) {
            const overlay = document.getElementById("confirm-overlay");
            const confirmBtn = document.getElementById("confirm-delete-btn");
            const cancelBtn = document.getElementById("cancel-delete-btn");

            overlay.classList.add("active");

            confirmBtn.onclick = async function () {
                const userDocRef = doc(db, "templates", userId);
                const templateRef = doc(userDocRef, "userTemplates", templateName);
                await deleteDoc(templateRef);
                overlay.classList.remove("active");
                showToast("Template deleted.");
                loadTemplates(userId);
            };

            cancelBtn.onclick = function () {
                overlay.classList.remove("active");
            };
        };

        // Modal controls
        window.openModal = function () {
            editingTemplateId = null;
            document.getElementById("template-name").value = "";
            document.getElementById("template-description").value = "";
            document.getElementById("template-category").value = "";
            document.getElementById("template-alias").value = "";
            document.getElementById("modal-title").textContent = "New Template";
            document.getElementById("modal-save-btn").textContent = "Save Template";
            document.getElementById("add-modal").classList.add("active");
            document.getElementById("template-name").focus();
        };

        window.closeModal = function () {
            document.getElementById("add-modal").classList.remove("active");
            editingTemplateId = null;
        };

        window.filterTemplates = function () {
            renderTemplates();
        };

        // Export templates
        window.exportTemplates = function () {
            if (allTemplates.length === 0) {
                showToast("No templates to export.", "error");
                return;
            }
            const data = allTemplates.map(t => ({
                name: t.name,
                description: t.description,
                category: t.category || ""
            }));
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "templates.json";
            a.click();
            URL.revokeObjectURL(url);
            showToast("Templates exported!");
        };

        // Import templates
        window.triggerImport = function () {
            document.getElementById("import-file").click();
        };

        window.handleImport = async function (event) {
            const file = event.target.files[0];
            if (!file) return;
            const user = auth.currentUser;
            if (!user) return;

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!Array.isArray(data)) {
                    showToast("Invalid file format.", "error");
                    return;
                }

                let count = 0;
                for (const t of data) {
                    if (!t.name || !t.description) continue;
                    const userDocRef = doc(db, "templates", user.uid);
                    const ref = doc(collection(userDocRef, "userTemplates"), t.name);
                    await setDoc(ref, {
                        name: t.name,
                        description: t.description,
                        category: t.category || ""
                    });
                    count++;
                }

                showToast(count + " templates imported!");
                loadTemplates(user.uid);
            } catch (e) {
                console.error("Import error:", e);
                showToast("Error importing: " + e.message, "error");
            }

            event.target.value = "";
        };
    </script>
</head>

<body>
    <header id="app-header" class="app-header"></header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="search-input" placeholder="Search templates..." oninput="filterTemplates()">
            </div>
            <button onclick="exportTemplates()" class="btn btn-outline btn-sm" title="Export templates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </button>
            <button onclick="triggerImport()" class="btn btn-outline btn-sm" title="Import templates">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(event)">
            <button onclick="openModal()" class="btn btn-primary">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Add
            </button>
        </div>
        <!-- Filter / Sort Bar -->
        <div class="filter-sort-bar">
            <div id="category-chips" class="category-chips"></div>
            <div class="sort-control-wrap">
                <div class="sort-control">
                    <button class="sort-btn active" data-sort="manual" onclick="setSort('manual')" title="Custom order — drag to reorder">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
                        Manual
                    </button>
                    <button class="sort-btn" data-sort="alpha" onclick="setSort('alpha')" title="Alphabetical preview">
                        A–Z
                    </button>
                    <button class="sort-btn" data-sort="category" onclick="setSort('category')" title="Preview grouped by category">
                        Category
                    </button>
                </div>
                <button id="apply-sort-btn" class="btn btn-primary btn-sm apply-sort-btn" onclick="applyCurrentSort()" style="display:none;">
                    Apply this order
                </button>
            </div>
        </div>

        <p id="template-count" class="template-count"></p>

        <!-- Template List -->
        <div id="template-list" class="template-list"></div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            <p>No templates yet</p>
            <button onclick="openModal()" class="btn btn-primary btn-sm">Create your first template</button>
        </div>
    </main>

    <!-- Add/Edit Template Modal -->
    <div id="add-modal" class="modal-overlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modal-title">New Template</h2>
                <button onclick="closeModal()" class="btn-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-row-modal">
                    <div class="form-group" style="flex:2">
                        <label for="template-name">Template Name</label>
                        <input type="text" id="template-name" placeholder="e.g. Check-in Instructions">
                    </div>
                    <div class="form-group" style="flex:1">
                        <label for="template-category">Category</label>
                        <select id="template-category" class="form-select">
                            <option value="">No category</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex:0 0 130px">
                        <label for="template-alias">Alias</label>
                        <input type="text" id="template-alias" placeholder="e.g. 1 / wifi" maxlength="16">
                    </div>
                </div>
                <div class="form-group">
                    <label for="template-description">Template Content</label>
                    <textarea id="template-description" placeholder="Write your template message here..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button onclick="closeModal()" class="btn btn-ghost">Cancel</button>
                <button onclick="saveTemplate()" id="modal-save-btn" class="btn btn-primary">Save Template</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div id="confirm-overlay" class="modal-overlay">
        <div class="modal modal-sm">
            <div class="modal-body" style="text-align:center; padding: 24px;">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <h3 style="margin-top:12px; color:#f1f5f9;">Delete this template?</h3>
                <p style="color:#94a3b8; margin-top:4px;">This action cannot be undone.</p>
            </div>
            <div class="modal-footer" style="justify-content:center;">
                <button id="cancel-delete-btn" class="btn btn-ghost">Cancel</button>
                <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
</body>

</html>
