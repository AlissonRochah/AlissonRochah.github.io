<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="style/theme.js"></script>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/login.css">

    <script type="module">
        import { signIn, redirectIfAuthed } from "./js/auth.js";

        const APP_HOME = "messages.html";

        await redirectIfAuthed(APP_HOME);

        window.login = async function () {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorMessage = document.getElementById("error-message");
            errorMessage.textContent = "";

            const { error } = await signIn(email, password);
            if (error) {
                errorMessage.textContent = "Invalid email or password.";
                return;
            }
            window.location.href = APP_HOME;
        };

        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") window.login();
        });
    </script>
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-wrapper">
                <img src="img/MasterLogo.jpg" alt="Master Logo" class="login-logo">
                <h1>Master Vacation</h1>
                <p class="login-subtitle">Sign in to your account</p>
                <div class="login-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@gmail.com">
                </div>
                <div class="login-input">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button onclick="window.login()" class="btn btn-primary btn-full">Sign In</button>
                <p id="error-message" class="error-text"></p>
            </div>
        </div>
    </div>
</body>

</html>
