<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="js/theme.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/login.css">

    <script type="module">
        import { app, auth } from "./js/firebase.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-analytics.js";
        import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";

        getAnalytics(app);

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            signInWithEmailAndPassword(auth, email, password)
                .then(() => {
                    window.location.href = "messages.html";
                })
                .catch((error) => {
                    errorMessage.innerText = "Invalid email or password.";
                });
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = "messages.html";
            }
        });

        window.login = login;
    </script>
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-wrapper">
                <img src="img/MasterLogo.jpg" alt="Master Logo" class="login-logo">
                <h1>Master Vacation</h1>
                <p class="login-subtitle">Sign in to your account</p>
                <div class="login-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@gmail.com">
                </div>
                <div class="login-input">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button onclick="window.login()" class="btn btn-primary btn-full">Sign In</button>
                <p id="error-message" class="error-text"></p>
            </div>
        </div>
    </div>
</body>

</html>
