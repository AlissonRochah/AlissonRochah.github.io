<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resort Manager — Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-body">
    <main class="login-card">
        <h1>Resort Manager</h1>
        <p class="subtitle">Sign in to manage resort information.</p>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" autocomplete="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <p class="error-text" id="error"></p>
            <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Sign In</button>
        </form>
    </main>

    <script type="module">
        import { getSession, signIn } from "./js/auth.js";

        // If already signed in, go straight to the dashboard without
        // ever showing this page.
        const session = await getSession();
        if (session) {
            window.location.replace("dashboard.html");
        } else {
            document.body.classList.add("ready");
        }

        const form = document.getElementById("login-form");
        const errorEl = document.getElementById("error");
        const submitBtn = document.getElementById("submit-btn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.textContent = "";
            submitBtn.disabled = true;
            submitBtn.textContent = "Signing in...";

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            const { error } = await signIn(email, password);

            if (error) {
                errorEl.textContent = error.message || "Could not sign in.";
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign In";
                return;
            }

            window.location.replace("dashboard.html");
        });
    </script>
</body>

</html>
