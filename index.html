<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="style/theme.js"></script>

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/login.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-analytics.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKYoUaxhOX1pagezUTTDbwWVg5ktcSEcY",
            authDomain: "templatemaster-a2d6e.firebaseapp.com",
            projectId: "templatemaster-a2d6e",
            storageBucket: "templatemaster-a2d6e.firebasestorage.app",
            messagingSenderId: "208432538664",
            appId: "1:208432538664:web:10a29a55efbb824ae1411d",
            measurementId: "G-LLVT6XW024"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth();

        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    localStorage.setItem("user", JSON.stringify(userCredential.user));
                    renderDashboard(userCredential.user);
                })
                .catch((error) => {
                    errorMessage.innerText = "Invalid email or password.";
                });
        }

        function logout() {
            signOut(auth).then(() => {
                localStorage.removeItem("user");
                window.location.reload();
            });
        }

        function renderDashboard(user) {
            document.body.innerHTML = `
                <div class='dashboard'>
                    <div class="dashboard-header">
                        <div class="dashboard-user">
                            <img src="img/MasterLogo.jpg" alt="Logo">
                            <span>${user.email}</span>
                        </div>
                        <button onclick="window.logout()" class="btn btn-sm btn-outline">Sign Out</button>
                    </div>
                    <div class="dashboard-menu">
                        <h1>Master Vacation</h1>
                        <p class="dashboard-subtitle">Select a tool to get started</p>
                        <div class="dashboard-cards">
                            <a href="template.html" class="dashboard-card">
                                <div class="card-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                </div>
                                <div class="card-info">
                                    <h3>Templates</h3>
                                    <p>Manage your message templates</p>
                                </div>
                            </a>
                            <a href="messages.html" class="dashboard-card">
                                <div class="card-icon">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                </div>
                                <div class="card-info">
                                    <h3>Messages</h3>
                                    <p>Generate guest messages</p>
                                </div>
                            </a>
                        </div>
                            <a href="settings.html" class="dashboard-card">
                                <div class="card-icon card-icon-settings">
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                                </div>
                                <div class="card-info">
                                    <h3>Settings</h3>
                                    <p>Configure your preferences</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>`;
        }

        window.addEventListener("load", () => {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    renderDashboard(user);
                }
            });
        });

        window.login = login;
        window.logout = logout;
    </script>
</head>

<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-wrapper">
                <img src="img/MasterLogo.jpg" alt="Master Logo" class="login-logo">
                <h1>Master Vacation</h1>
                <p class="login-subtitle">Sign in to your account</p>
                <div class="login-input">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@gmail.com">
                </div>
                <div class="login-input">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Password">
                </div>
                <button onclick="window.login()" class="btn btn-primary btn-full">Sign In</button>
                <p id="error-message" class="error-text"></p>
            </div>
        </div>
    </div>
</body>

</html>
