<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Time</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .break {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #000;
            overflow: hidden;
        }
        .break-bg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            /* contain so the full Canva frame (blobs + logo + safe area)
               always shows; cover was cropping the corners. */
            object-fit: contain;
            background: #000;
            z-index: 0;
        }
        .break-content {
            position: relative;
            z-index: 2;
            padding: 24px 32px;
            max-width: 92vw;
        }
        .break-name {
            font-size: clamp(80px, 14vw, 260px);
            font-weight: 200;
            line-height: 0.95;
            text-transform: uppercase;
            letter-spacing: 0.01em;
            margin-bottom: 36px;
        }
        .break-status {
            font-size: clamp(24px, 3vw, 48px);
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.25;
        }
        .break-time {
            font-size: clamp(24px, 3vw, 48px);
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.06em;
            line-height: 1.25;
        }
        .break-close {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.15s;
            z-index: 3;
        }
        .break-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.06);
        }
        .break-hint {
            position: fixed;
            top: 22px;
            left: 22px;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            z-index: 3;
        }
        .break-fs-cta {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: clamp(18px, 2vw, 24px);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 9999;
        }
        .break-fs-cta[hidden] { display: none; }
    </style>
</head>

<body>
    <div class="break">
        <video class="break-bg-video" id="bg-video" autoplay loop muted playsinline preload="auto">
            <source src="img/break-bg.mp4" type="video/mp4">
        </video>
        <div class="break-content">
            <div class="break-name" id="name">—</div>
            <div class="break-status">BREAK IN PROGRESS</div>
            <div class="break-time" id="time">—</div>
        </div>
        <div class="break-hint">Esc to close</div>
        <div class="break-fs-cta" id="fs-cta" hidden>Click anywhere to enter fullscreen</div>
        <button class="break-close" id="close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    <script>
        const params = new URLSearchParams(location.search);
        const name = (params.get("name") || "").trim() || "—";
        const duration = Math.max(1, Number(params.get("min")) || 45);

        const pad = (n) => String(n).padStart(2, "0");
        function fmt(d) {
            // 12-hour AM/PM format — "8:35 PM"
            let h = d.getHours();
            const m = pad(d.getMinutes());
            const ampm = h >= 12 ? "PM" : "AM";
            h = h % 12 || 12;
            return `${h}:${m} ${ampm}`;
        }

        const now = new Date();
        const end = new Date(now.getTime() + duration * 60 * 1000);

        document.getElementById("name").textContent = name;
        document.getElementById("time").textContent = `${fmt(now)} - ${fmt(end)}`;

        const cta = document.getElementById("fs-cta");
        function tryFullscreen() {
            const el = document.documentElement;
            const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
            if (req) req.call(el).catch(() => {});
        }
        function updateCta() {
            cta.hidden = !!document.fullscreenElement;
        }
        document.addEventListener("fullscreenchange", updateCta);
        // First auto-attempt — uses the activation propagated from the opener.
        tryFullscreen();
        // After a beat, if we still aren't fullscreen, surface the CTA so
        // the operator sees they need to click once.
        setTimeout(() => { if (!document.fullscreenElement) cta.hidden = false; }, 250);
        document.addEventListener("click", (e) => {
            if (e.target.closest("#close")) return;
            if (!document.fullscreenElement) tryFullscreen();
        });

        function closeBreak() {
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
            window.close();
        }
        document.getElementById("close").addEventListener("click", closeBreak);
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeBreak();
        });
    </script>
</body>

</html>
