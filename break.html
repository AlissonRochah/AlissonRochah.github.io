<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Time</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #111;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .break {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-color: #111;
            /* Layered: dark scrim → break-bg.gif/jpg → coffee-tone fallback */
            background-image:
                linear-gradient(135deg, rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.55)),
                url("img/break-bg.gif"),
                url("img/break-bg.jpg"),
                linear-gradient(135deg, #2d1810, #5e3a1f 60%, #8b6240);
            background-size: cover, cover, cover, cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .break-content {
            padding: 32px;
            max-width: 90vw;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
        }
        .break-emoji {
            font-size: clamp(96px, 16vw, 220px);
            line-height: 1;
            margin-bottom: 24px;
        }
        .break-title {
            font-size: clamp(36px, 5.5vw, 72px);
            font-weight: 800;
            letter-spacing: 0.12em;
            margin-bottom: 28px;
            text-transform: uppercase;
        }
        .break-name {
            font-size: clamp(56px, 9vw, 150px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .break-time {
            font-size: clamp(28px, 4.5vw, 60px);
            font-weight: 500;
            opacity: 0.95;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }
        .break-close {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.15s;
        }
        .break-close:hover {
            background: rgba(0, 0, 0, 0.75);
            transform: scale(1.06);
        }
        .break-hint {
            position: fixed;
            bottom: 18px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
        }
    </style>
</head>

<body>
    <div class="break">
        <div class="break-content">
            <div class="break-emoji">☕</div>
            <div class="break-title">BREAK TIME</div>
            <div class="break-name" id="name">—</div>
            <div class="break-time" id="time">—</div>
        </div>
        <button class="break-close" id="close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
        <div class="break-hint">Press Esc or click × to close</div>
    </div>
    <script>
        // Read ?name= from the URL; opener passes the operator's display name.
        const params = new URLSearchParams(location.search);
        const name = (params.get("name") || "").trim() || "—";
        const duration = Math.max(1, Number(params.get("min")) || 45);

        const pad = (n) => String(n).padStart(2, "0");
        const fmt = (d) => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

        const now = new Date();
        const end = new Date(now.getTime() + duration * 60 * 1000);

        document.getElementById("name").textContent = name;
        document.getElementById("time").textContent = `${fmt(now)} — ${fmt(end)}`;

        // Request fullscreen as soon as the document is ready. The user
        // activation from the opener's button propagates to this window
        // long enough for the first frame, which is what Fullscreen API
        // needs.
        function tryFullscreen() {
            const el = document.documentElement;
            const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
            if (req) req.call(el).catch(() => { /* silently ignore — popup is already screen-sized */ });
        }
        tryFullscreen();
        // Some browsers need the gesture inside this window; a click anywhere
        // triggers fullscreen if the auto attempt was blocked.
        document.addEventListener("click", (e) => {
            if (e.target.closest("#close")) return;
            if (!document.fullscreenElement) tryFullscreen();
        });

        function closeBreak() {
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
            window.close();
        }
        document.getElementById("close").addEventListener("click", closeBreak);
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeBreak();
        });
    </script>
</body>

</html>
