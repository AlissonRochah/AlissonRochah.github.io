<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Time</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #fff;
            user-select: none;
            cursor: default;
        }
        .break {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #000;
            overflow: hidden;
        }
        .break-bg-video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        .break-content {
            position: relative;
            z-index: 2;
            padding: 32px;
            max-width: 92vw;
        }
        .break-name {
            font-size: clamp(72px, 13vw, 240px);
            font-weight: 300;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 56px;
        }
        .break-status {
            font-size: clamp(22px, 3vw, 44px);
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }
        .break-time {
            font-size: clamp(22px, 3vw, 44px);
            font-weight: 400;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.04em;
        }
        .break-close {
            position: fixed;
            top: 22px;
            right: 22px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.15s;
            z-index: 3;
        }
        .break-close:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.06);
        }
        .break-hint {
            position: fixed;
            top: 22px;
            left: 22px;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            z-index: 3;
        }
    </style>
</head>

<body>
    <div class="break">
        <video class="break-bg-video" id="bg-video" autoplay loop muted playsinline preload="auto">
            <source src="img/break-bg.mp4" type="video/mp4">
        </video>
        <div class="break-content">
            <div class="break-name" id="name">—</div>
            <div class="break-status">BREAK IN PROGRESS</div>
            <div class="break-time" id="time">—</div>
        </div>
        <div class="break-hint">Esc to close</div>
        <button class="break-close" id="close" aria-label="Close">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"/>
                <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
        </button>
    </div>
    <script>
        const params = new URLSearchParams(location.search);
        const name = (params.get("name") || "").trim() || "—";
        const duration = Math.max(1, Number(params.get("min")) || 45);

        const pad = (n) => String(n).padStart(2, "0");
        const fmt = (d) => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

        const now = new Date();
        const end = new Date(now.getTime() + duration * 60 * 1000);

        document.getElementById("name").textContent = name;
        document.getElementById("time").textContent = `${fmt(now)} - ${fmt(end)}`;

        function tryFullscreen() {
            const el = document.documentElement;
            const req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
            if (req) req.call(el).catch(() => {});
        }
        tryFullscreen();
        document.addEventListener("click", (e) => {
            if (e.target.closest("#close")) return;
            if (!document.fullscreenElement) tryFullscreen();
        });

        function closeBreak() {
            if (document.fullscreenElement && document.exitFullscreen) {
                document.exitFullscreen().catch(() => {});
            }
            window.close();
        }
        document.getElementById("close").addEventListener("click", closeBreak);
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeBreak();
        });
    </script>
</body>

</html>
