<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="js/theme.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/units.css">

    <script type="module">
        import { auth, db } from "./js/firebase.js";
        import { showToast } from "./js/toast.js";
        import { renderHeader } from "./js/nav.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        renderHeader("units");

        const DEFAULT_PROXY_URL = "https://alisson-rochah-github-io.vercel.app";
        const CACHE_KEY = "masterbotUnitsCache";
        const CACHE_SCHEMA = 2;
        const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
        const JOBBER_EXTENSION_ID = "dmaenamjjgeclplnofeoiipddinihhhl";
        const JOBBER_MAPPING_KEY = "masterbotJobberMapping";
        let proxyUrl = localStorage.getItem("masterbotProxyUrl") || DEFAULT_PROXY_URL;
        let currentUser = null;
        let allUnits = [];
        let filteredUnits = [];
        let expandedKey = null;

        function readCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (!obj || !obj.ts || !Array.isArray(obj.units)) return null;
                if (obj.schema !== CACHE_SCHEMA) return null;
                if (Date.now() - obj.ts > CACHE_TTL_MS) return null;
                return obj;
            } catch (_) { return null; }
        }

        function writeCache() {
            try {
                const stripped = allUnits.map((u) => {
                    const { _stays, _staysFetching, ...rest } = u;
                    return rest;
                });
                localStorage.setItem(CACHE_KEY, JSON.stringify({ schema: CACHE_SCHEMA, ts: Date.now(), units: stripped }));
            } catch (_) { /* quota or serialization errors — ignore */ }
        }

        const initialCache = readCache();
        if (initialCache) {
            allUnits = initialCache.units;
            filteredUnits = allUnits;
            document.getElementById("count").innerText = `${allUnits.length} units`;
            render();
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = user;
            document.getElementById("user-email").innerText = user.email;

            if (initialCache) return;

            try {
                const globalRef = doc(db, "settings", "global");
                const snap = await getDoc(globalRef);
                if (snap.exists() && snap.data().proxyUrl) {
                    proxyUrl = snap.data().proxyUrl;
                }
            } catch (_) { /* ignore */ }

            await loadUnits();
        });

        async function loadUnits(forceFresh) {
            const status = document.getElementById("status");

            if (!forceFresh) {
                const cached = readCache();
                if (cached) {
                    allUnits = cached.units;
                    filteredUnits = allUnits;
                    document.getElementById("count").innerText = `${allUnits.length} units`;
                    status.innerText = "";
                    status.className = "units-status";
                    render();
                    return;
                }
            }

            status.innerText = "Loading units…";
            status.className = "units-status loading";

            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/units", {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.status === 503) {
                    const body = await res.json().catch(() => ({}));
                    if (body.error === "MAPRO_NOT_LOGGED_IN") {
                        status.innerText = "MAPRO session expired. An admin needs to refresh the cookie in the proxy.";
                        status.className = "units-status error";
                        return;
                    }
                }
                if (!res.ok) {
                    status.innerText = `Error ${res.status} loading units.`;
                    status.className = "units-status error";
                    return;
                }
                const data = await res.json();
                allUnits = Array.isArray(data.units) ? data.units : [];
                filteredUnits = allUnits;
                writeCache();
                document.getElementById("count").innerText = `${allUnits.length} units`;
                status.innerText = "";
                status.className = "units-status";
                render();
            } catch (e) {
                status.innerText = "Network error: " + e.message;
                status.className = "units-status error";
            }
        }

        function escapeHtml(s) {
            if (s === null || s === undefined) return "";
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function imageThumb(htmlStr) {
            if (!htmlStr) return "";
            const m = String(htmlStr).match(/src=['"]([^'"]+)['"]/);
            return m ? `<img src="${escapeHtml(m[1])}" alt="" class="unit-thumb">` : "";
        }

        function applyFilter() {
            const q = document.getElementById("search").value.trim().toLowerCase();
            if (!q) { filteredUnits = allUnits; }
            else {
                filteredUnits = allUnits.filter((u) => {
                    return (u.code || "").toLowerCase().includes(q)
                        || (u.title || "").toLowerCase().includes(q)
                        || (u.address || "").toLowerCase().includes(q)
                        || (u.resort || "").toLowerCase().includes(q)
                        || (u.homeowner || "").toLowerCase().includes(q);
                });
            }
            render();
        }

        function isAddressFull(addr) {
            if (!addr) return false;
            return /,/.test(addr) && /\b(FL|Florida)\b/i.test(addr);
        }

        async function fetchFullAddress(u) {
            if (u._fullAddress || u._addressFetching) return;
            u._addressFetching = true;
            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/unit-address?id=" + encodeURIComponent(u.idMAPRO), {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.ok) {
                    const data = await res.json();
                    u._fullAddress = data.address || u.address;
                    writeCache();
                    if (expandedKey === u.key) render();
                }
            } catch (_) { /* fall back to bulk address */ }
            finally { u._addressFetching = false; }
        }

        async function fetchStays(u) {
            if (u._stays || u._staysFetching || !u.ulid) return;
            u._staysFetching = true;
            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/unit-stays?key=" + encodeURIComponent(u.ulid), {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.ok) {
                    u._stays = await res.json();
                    if (expandedKey === u.key) render();
                }
            } catch (_) { /* ignore */ }
            finally { u._staysFetching = false; }
        }

        async function fetchLinkStays(u, date) {
            if (!u.ulid) return;
            if (u._linkStaysFetching) return;
            if (u._linkStays && u._linkStaysDate === date) return;
            u._linkStaysFetching = true;
            u._linkStays = null;
            u._linkStaysDate = date;
            render();
            try {
                const idToken = await currentUser.getIdToken();
                const url = proxyUrl + "/api/mapro/unit-stays?key=" + encodeURIComponent(u.ulid)
                    + (date ? "&date=" + encodeURIComponent(date) : "");
                const res = await fetch(url, {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.ok) {
                    u._linkStays = await res.json();
                }
            } catch (_) { /* ignore */ }
            finally {
                u._linkStaysFetching = false;
                render();
            }
        }

        function jobberMessage(action, payload) {
            return new Promise((resolve) => {
                if (typeof chrome === "undefined" || !chrome.runtime || !chrome.runtime.sendMessage) {
                    resolve({ ok: false, error: "no_extension_api" });
                    return;
                }
                try {
                    chrome.runtime.sendMessage(JOBBER_EXTENSION_ID, { action, payload }, (response) => {
                        if (chrome.runtime.lastError) {
                            resolve({ ok: false, error: "extension_unreachable" });
                            return;
                        }
                        resolve(response || { ok: false, error: "no_response" });
                    });
                } catch (e) {
                    resolve({ ok: false, error: String(e && e.message || e) });
                }
            });
        }

        async function jobberQuery(operationName, query, variables) {
            const res = await jobberMessage("jobber-query", { operationName, query, variables: variables || {} });
            if (!res || !res.ok) {
                const err = new Error(res && res.error || "jobber_unknown_error");
                err.code = res && res.error;
                throw err;
            }
            return res.data;
        }

        async function maproAddComment(reservaId, casaId, comment) {
            const res = await jobberMessage("mapro-add-comment", { reservaId, casaId, comment });
            if (!res || !res.ok) {
                const err = new Error(res && res.error || "mapro_unknown_error");
                err.code = res && res.error;
                throw err;
            }
            return res.data;
        }

        async function maproListServices(reservaId) {
            const res = await jobberMessage("mapro-list-services", { reservaId });
            if (!res || !res.ok) {
                const err = new Error(res && res.error || "list_services_failed");
                err.code = res && res.error;
                throw err;
            }
            return res.data;
        }

        // Pre-fetch e cache dos services MAPRO de cada stay (active/next/previous)
        // pra o aviso de BBQ duplicado funcionar ao vivo enquanto user seleciona data.
        async function ensureMaproServicesForStays(u) {
            const stays = [u._stays?.previous, u._stays?.active, u._stays?.next].filter((s) => s && s.id);
            if (stays.length === 0) return;
            u._maproServicesCache = u._maproServicesCache || {};
            u._maproServicesFetching = u._maproServicesFetching || {};
            for (const stay of stays) {
                if (u._maproServicesCache[stay.id]) continue;
                if (u._maproServicesFetching[stay.id]) continue;
                u._maproServicesFetching[stay.id] = true;
                render();
                maproListServices(stay.id).then((data) => {
                    u._maproServicesCache[stay.id] = data.services || [];
                }).catch((e) => {
                    console.warn("[MB] failed list services for stay", stay.id, e);
                    u._maproServicesCache[stay.id] = []; // marca como buscado pra não repetir
                }).finally(() => {
                    delete u._maproServicesFetching[stay.id];
                    render();
                });
            }
        }

        function findBBQDuplicateForDate(u, date) {
            if (!date) return null;
            const stays = [u._stays?.previous, u._stays?.active, u._stays?.next].filter(Boolean);
            const stay = stays.find((s) => s && s.id && stayCoversDate(s, date));
            if (!stay) return null;
            const cached = u._maproServicesCache && u._maproServicesCache[stay.id];
            if (!cached) return null;
            const dup = cached.find((svc) => /\bbbq\b/i.test(svc.label || "") && svc.start_date === date);
            return dup ? { stay, service: dup } : null;
        }

        function bbqDateWarning(u, date) {
            if (!date) return "";
            const stays = [u._stays?.previous, u._stays?.active, u._stays?.next].filter(Boolean);
            const stay = stays.find((s) => s && s.id && stayCoversDate(s, date));
            if (!stay) return "";
            if (u._maproServicesFetching && u._maproServicesFetching[stay.id]) {
                return `<div class="extras-info">Checking MAPRO…</div>`;
            }
            const dup = findBBQDuplicateForDate(u, date);
            if (dup) {
                return `<div class="extras-warn">⚠ Já tem ${escapeHtml(dup.service.label)} no MAPRO pra ${escapeHtml(date)}</div>`;
            }
            return "";
        }

        async function maproAddService(reservaId, kind, price, startDate, endDate, opts) {
            const payload = { reservaId, kind, price, startDate, endDate };
            if (opts && opts.force) payload.force = true;
            if (opts && opts.dryRun) payload.dryRun = true;
            const res = await jobberMessage("mapro-add-service", payload);
            if (!res || !res.ok) {
                const err = new Error(res && res.error || "mapro_service_unknown_error");
                err.code = res && res.error;
                throw err;
            }
            return res.data;
        }

        function isPoolHeatJob(title) {
            // Aceita: "Pool Heat", "Pool Heater", "Pool Heating", "PH" (com word boundary)
            return /pool\s*heat/i.test(title) || /\bph\b/i.test(title);
        }
        function isOnJob(title) { return /\bon\b/i.test(title); }
        function isOffJob(title) { return /\boff\b/i.test(title); }

        function maproServiceForJob(cj, allJobs) {
            const title = String(cj.title || "");
            if (/\bbbq\b/i.test(title)) {
                const d = cj.startAt;
                return { kind: "bbq", price: 75, startDate: d, endDate: d };
            }
            // Pool Heat: pareia PH On com PH Off da mesma reserva no mesmo batch.
            // Botão aparece só no PH On; PH Off só recebe o status quando o On é processado.
            if (isPoolHeatJob(title)) {
                if (isOffJob(title)) return null;
                if (!isOnJob(title)) return null;
                const list = allJobs || [];
                const partner = list.find((j) =>
                    j !== cj &&
                    j.status === "ok" &&
                    j._link === "linked" &&
                    j._linkedReservaId === cj._linkedReservaId &&
                    isPoolHeatJob(String(j.title || "")) &&
                    isOffJob(String(j.title || ""))
                );
                if (!partner) return null;
                const onDate = cj.startAt;
                const offDate = partner.startAt;
                if (!onDate || !offDate) return null;
                const d = new Date(onDate + "T00:00:00");
                d.setDate(d.getDate() + 1);
                const startDate = d.toISOString().slice(0, 10);
                return { kind: "ph", price: 0, startDate, endDate: offDate, partnerIdx: list.indexOf(partner) };
            }
            return null;
        }

        function stayCoversDate(stay, dateStr) {
            if (!stay || !dateStr) return false;
            const d = new Date(dateStr + "T00:00:00").getTime();
            const ci = new Date(String(stay.ci || "").replace(" ", "T")).getTime();
            const co = new Date(String(stay.co || "").replace(" ", "T")).getTime();
            if (Number.isNaN(d) || Number.isNaN(ci) || Number.isNaN(co)) return false;
            return ci <= d && d <= co;
        }

        function readJobberMapping() {
            try { return JSON.parse(localStorage.getItem(JOBBER_MAPPING_KEY) || "{}"); }
            catch (_) { return {}; }
        }

        function writeJobberMapping(map) {
            try { localStorage.setItem(JOBBER_MAPPING_KEY, JSON.stringify(map)); }
            catch (_) { /* quota — ignore */ }
        }

        async function fetchJobberMatch(u) {
            if (u._jobber || u._jobberFetching) return;
            u._jobberFetching = true;
            try {
                const map = readJobberMapping();
                const cached = map[u.key];
                if (cached) {
                    u._jobber = { match: cached };
                    if (expandedKey === u.key) render();
                    return;
                }
                const ping = await jobberMessage("ping");
                if (!ping || !ping.ok) {
                    u._jobber = { error: ping && ping.error || "extension_unreachable" };
                    if (expandedKey === u.key) render();
                    return;
                }
                const street = (u._fullAddress || u.address || "").split(",")[0].trim();
                if (!street) {
                    u._jobber = { error: "no_address" };
                    if (expandedKey === u.key) render();
                    return;
                }
                const streetNumber = (street.match(/^\S+/) || [""])[0];
                const searchQuery = `query GlobalSearch($searchTerm: String!, $before: String, $after: String, $first: Int, $last: Int) {
                    search(searchTerm: $searchTerm, first: $first, last: $last, before: $before, after: $after) {
                        nodes {
                            __typename
                            ... on Property {
                                id
                                propertyName: name
                                street
                                propertySc: client { id name __typename }
                                __typename
                            }
                        }
                    }
                }`;
                async function runSearch(term) {
                    return jobberQuery("GlobalSearch", searchQuery, { searchTerm: term, first: 10 })
                        .catch((e) => ({ _error: e.message || String(e) }));
                }
                const tried = [];
                const codeFull = (u.code || "").trim();
                const codePrefix = (codeFull.match(/^\S+/) || [""])[0];
                const attempts = [];
                if (street) attempts.push(street);
                if (streetNumber && streetNumber !== street) attempts.push(streetNumber);
                if (codePrefix) attempts.push(codePrefix);
                if (codeFull && codeFull !== codePrefix) attempts.push(codeFull);
                let data, propertyNodes = [];
                for (const term of attempts) {
                    if (tried.includes(term)) continue;
                    data = await runSearch(term);
                    tried.push(term);
                    if (data && data._error) break;
                    const nodes = (data && data.search && data.search.nodes) || [];
                    propertyNodes = nodes.filter((n) => n && n.__typename === "Property");
                    if (propertyNodes.length > 0) break;
                }
                if (data && data._error) {
                    u._jobber = { error: data._error };
                } else {
                    const candidates = propertyNodes
                        .map((n) => ({
                            id: n.id,
                            propertyName: n.propertyName,
                            street: n.street,
                            client: n.propertySc || null,
                        }));
                    if (candidates.length === 1) {
                        const c = candidates[0];
                        const label = c.street || c.propertyName || (c.client && c.client.name) || c.id;
                        const map = readJobberMapping();
                        map[u.key] = {
                            propertyId: c.id,
                            clientId: c.client && c.client.id || "",
                            propertyName: c.propertyName || "",
                            clientName: c.client && c.client.name || "",
                            label,
                            ts: Date.now(),
                        };
                        writeJobberMapping(map);
                        u._jobber = { match: map[u.key] };
                    } else {
                        u._jobber = { candidates, tried };
                    }
                }
                if (expandedKey === u.key) render();
            } catch (e) {
                u._jobber = { error: String(e && e.message || e) };
                if (expandedKey === u.key) render();
            } finally {
                u._jobberFetching = false;
            }
        }

        window.manualJobberSearch = async function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            const input = document.getElementById(`manual-search-${key}`);
            const term = input && input.value.trim();
            if (!term) { showToast("Type something to search"); return; }
            const tried = (u._jobber && u._jobber.tried) || [];
            u._jobber = { candidates: u._jobber && u._jobber.candidates || [], tried, searching: true };
            render();
            try {
                const data = await jobberQuery(
                    "GlobalSearch",
                    `query GlobalSearch($searchTerm: String!, $first: Int) {
                        search(searchTerm: $searchTerm, first: $first) {
                            nodes {
                                __typename
                                ... on Property {
                                    id
                                    propertyName: name
                                    street
                                    propertySc: client { id name __typename }
                                    __typename
                                }
                            }
                        }
                    }`,
                    { searchTerm: term, first: 20 }
                );
                const nodes = (data && data.search && data.search.nodes) || [];
                const candidates = nodes
                    .filter((n) => n && n.__typename === "Property")
                    .map((n) => ({
                        id: n.id,
                        propertyName: n.propertyName,
                        street: n.street,
                        client: n.propertySc || null,
                    }));
                u._jobber = { candidates, tried: [...tried, term] };
            } catch (e) {
                u._jobber = { error: String(e && e.message || e) };
            }
            render();
        };

        window.confirmJobberMatch = function (key, idx) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._jobber || !Array.isArray(u._jobber.candidates)) return;
            const c = u._jobber.candidates[Number(idx)];
            if (!c) return;
            const label = c.street || c.propertyName || (c.client && c.client.name) || c.id;
            const map = readJobberMapping();
            map[key] = {
                propertyId: c.id,
                clientId: c.client && c.client.id || "",
                propertyName: c.propertyName || "",
                clientName: c.client && c.client.name || "",
                label,
                ts: Date.now(),
            };
            writeJobberMapping(map);
            u._jobber = { match: map[key] };
            if (expandedKey === key) render();
        };

        window.clearJobberMatch = function (key) {
            const map = readJobberMapping();
            delete map[key];
            writeJobberMapping(map);
            const u = filteredUnits.find((x) => x.key === key);
            if (u) {
                u._jobber = null;
                if (expandedKey === key) {
                    fetchJobberMatch(u);
                }
            }
        };

        function toggleExpand(key) {
            expandedKey = (expandedKey === key) ? null : key;
            render();
            if (expandedKey) {
                const u = filteredUnits.find((x) => x.key === key);
                if (u && !isAddressFull(u.address)) fetchFullAddress(u);
                if (u) fetchStays(u);
                if (u) fetchJobberMatch(u);
            }
        }

        function detailsHtml(u) {
            const rows = [
                ["Address", u._fullAddress || u.address],
                ["Gate code", u.gatePassword],
                ["Responsible", u.responsible],
                ["Cleaner", u.cleaner],
                ["Sleeps", u.MaxOccupancy],
                ["Resort", u.resort],
                ["Resort address", u.resortAddress],
                ["Bedrooms", u.BedroomCount],
                ["Bathrooms", u.BathroomCount],
                ["Living area (sqft)", u.total_living_area_sqft],
                ["Layout", u.Layoutbeds],
                ["Type", u.Type],
            ].filter(([_, v]) => v !== null && v !== undefined && v !== "");

            const detailsRows = rows.map(([k, v]) => `
                <div class="unit-detail-row">
                    <span class="unit-detail-key">${escapeHtml(k)}</span>
                    <span class="unit-detail-val copyable" data-copy="${escapeHtml(v)}">${escapeHtml(v)}</span>
                </div>
            `).join("");

            return `<div class="unit-details">${detailsRows}</div>${staysHtml(u)}${jobberExtrasHtml(u)}`;
        }

        function fmtDate(s) {
            if (!s) return "";
            const d = new Date(String(s).replace(" ", "T"));
            if (isNaN(d)) return s;
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
        }

        function stayCard(label, r, kind) {
            if (!r) {
                return `<div class="stay-card stay-empty stay-${kind}">
                    <div class="stay-label">${label}</div>
                    <div class="stay-empty-text">No guest</div>
                </div>`;
            }
            const dates = `${fmtDate(r.ci)} - ${fmtDate(r.co)}`;
            const ch = String(r.channel || "");
            const isAirbnb = /airbnb/i.test(ch);
            const isVrbo = /vrbo/i.test(ch);
            const channelClass = /red\s*airbnb/i.test(ch) ? "stay-pill stay-pill-red"
                : /green\s*airbnb/i.test(ch) ? "stay-pill stay-pill-green"
                : isVrbo ? "stay-pill stay-pill-vrbo"
                : "stay-pill";
            const channel = ch ? `<span class="${channelClass}">${escapeHtml(ch)}</span>` : "";
            const conf = r.confirmation ? `<span class="copyable stay-conf" data-copy="${escapeHtml(r.confirmation)}">${escapeHtml(r.confirmation)}</span>` : "";
            const door = r.doorCode ? `<span class="copyable stay-door" data-copy="${escapeHtml(r.doorCode)}">Door ${escapeHtml(r.doorCode)}</span>` : "";
            const maproLink = r.link ? `<a class="btn-mapro" href="https://app.mapro.us${escapeHtml(r.link)}" target="_blank" rel="noopener">MAPRO ↗</a>` : "";
            const airbnbVariant = /red\s*airbnb/i.test(ch) ? " btn-airbnb-red"
                : /green\s*airbnb/i.test(ch) ? " btn-airbnb-green"
                : "";
            const platformLink = isAirbnb && r.confirmation
                ? `<a class="btn-airbnb${airbnbVariant}" href="https://www.airbnb.com/hosting/reservations/details/${encodeURIComponent(r.confirmation)}" target="_blank" rel="noopener">Airbnb ↗</a>`
                : isVrbo && r.guest
                ? `<a class="btn-vrbo" href="https://www.vrbo.com/supply/inbox?search=${encodeURIComponent(r.guest)}" target="_blank" rel="noopener">VRBO ↗</a>`
                : "";
            const actions = [platformLink, maproLink].filter(Boolean).join("");
            return `<div class="stay-card stay-${kind}">
                <div class="stay-label">${label}</div>
                <div class="stay-guest">${escapeHtml(r.guest || "Unknown")}</div>
                <div class="stay-dates">${dates}</div>
                <div class="stay-meta">${channel}${conf}${door}</div>
                ${actions ? `<div class="stay-actions">${actions}</div>` : ""}
            </div>`;
        }

        function staysHtml(u) {
            if (!u.ulid) return "";
            if (!u._stays) {
                return `<div class="unit-stays-loading">Loading stays…</div>`;
            }
            const right = u._stays.active
                ? stayCard("Current guest", u._stays.active, "now")
                : stayCard("Next guest", u._stays.next, "next");
            return `<div class="unit-stays">
                ${stayCard("Previous guest", u._stays.previous, "prev")}
                ${right}
            </div>`;
        }

        function todayIso() {
            const d = new Date();
            return d.toISOString().slice(0, 10);
        }

        function renderSvcAction(u, cj, idx) {
            const keyAttr = escapeHtml(u.key);
            if (cj._svc === "busy") return `<span class="svc-tag svc-busy">adding service…</span>`;
            if (cj._svc === "done") {
                const lbl = cj._svcLabel ? ` <span class="svc-label">${escapeHtml(cj._svcLabel)}</span>` : "";
                return `<span class="svc-tag svc-done">✓ service added${lbl}</span>`;
            }
            const hasOwnAction = !!maproServiceForJob(cj, u._extraJobs);
            if (cj._svc === "error") {
                const retryBtn = hasOwnAction
                    ? `<button class="btn-link-retry" type="button" onclick="addMaproService('${keyAttr}', ${idx})">Retry</button>`
                    : "";
                return `<span class="svc-tag svc-error" title="${escapeHtml(cj._svcError || "")}">✗ service failed</span>${retryBtn}`;
            }
            if (!hasOwnAction) return "";
            return `<button class="btn-link-mapro" type="button" onclick="addMaproService('${keyAttr}', ${idx})">+ Add to MAPRO</button>`;
        }

        function linkSectionHtml(u) {
            if (!u._extraJobs || u._extraJobs.length === 0) return "";
            const ok = u._extraJobs.filter((cj) => cj.status === "ok");
            if (ok.length === 0) return "";
            const keyAttr = escapeHtml(u.key);
            if (ok.some((cj) => cj._link === "linking")) {
                return `<div class="extras-link-row link-pending">Linking…</div>`;
            }
            const errCj = ok.find((cj) => cj._link === "error");
            if (errCj) {
                return `<div class="extras-link-row link-error">
                    <span>✗ ${escapeHtml(errCj._linkError || "Failed")}</span>
                    <button class="btn-link-retry" type="button" onclick="startLinkMapro('${keyAttr}')">Retry</button>
                </div>`;
            }
            if (u._maproPanelOpen) {
                const step = u._maproPanelStep || "link";
                const cancelBtn = `<button class="btn-link-cancel" type="button" onclick="cancelLinkMapro('${keyAttr}')">×</button>`;

                // Step 1: pede payment link
                if (step === "link") {
                    return `<div class="extras-link-panel">
                        <div class="extras-link-row link-step-input">
                            <input type="text" class="payment-link-input" id="payment-link-${keyAttr}"
                                placeholder="Payment link (optional)"
                                value="${escapeHtml(u._paymentLinkValue || "")}"
                                onkeydown="if(event.key==='Enter'){event.preventDefault();advanceLinkMapro('${keyAttr}');}">
                            <button class="btn-link-continue" type="button" onclick="advanceLinkMapro('${keyAttr}')">Continue</button>
                            ${cancelBtn}
                        </div>
                    </div>`;
                }

                // Step 2: mostra os 3 guests pra selecionar
                if (u._linkStaysFetching || !u._linkStays) {
                    return `<div class="extras-link-row">Loading stays… ${cancelBtn}</div>`;
                }
                const stays = [
                    { label: "Previous", stay: u._linkStays.previous },
                    { label: "Current", stay: u._linkStays.active },
                    { label: "Next", stay: u._linkStays.next },
                ];
                const hasAny = stays.some((s) => s.stay && Number(s.stay.id) > 0);
                if (!hasAny) {
                    return `<div class="extras-link-row">No stays available ${cancelBtn}</div>`;
                }
                // PH ON cai no gap entre guests; preferimos outro job como referência.
                const isPhOnJob = (cj) => {
                    const t = String(cj.title || "");
                    return isPoolHeatJob(t) && isOnJob(t);
                };
                const unlinked = ok.filter((cj) => cj._link !== "linked");
                const refCj = unlinked.find((cj) => !isPhOnJob(cj)) || unlinked[0] || ok[0];
                const referenceDate = refCj.startAt;
                const buttons = stays.map((s) => {
                    const present = s.stay && Number(s.stay.id) > 0;
                    if (!present) {
                        return `<button class="btn-stay-pick btn-stay-pick-empty" type="button" disabled>
                            <span class="stay-pick-label">${escapeHtml(s.label)}</span>
                            <span class="stay-pick-guest">—</span>
                            <span class="stay-pick-dates">no guest</span>
                        </button>`;
                    }
                    const match = stayCoversDate(s.stay, referenceDate);
                    const matchTag = match ? ` <span class="stay-match-tag">match</span>` : "";
                    const dates = `${String(s.stay.ci || "").slice(0, 10)} → ${String(s.stay.co || "").slice(0, 10)}`;
                    return `<button class="btn-stay-pick${match ? " btn-stay-pick-match" : ""}" type="button" onclick="confirmLinkMapro('${keyAttr}', ${Number(s.stay.id)})">
                        <span class="stay-pick-label">${escapeHtml(s.label)}</span>
                        <span class="stay-pick-guest">${escapeHtml(s.stay.guest || "Unknown")}</span>
                        <span class="stay-pick-dates">${escapeHtml(dates)}</span>
                        ${matchTag}
                    </button>`;
                }).join("");
                return `<div class="extras-link-panel">
                    <div class="extras-link-row link-picking">
                        <span class="link-label">Pick guest:</span>
                        ${cancelBtn}
                    </div>
                    <div class="stay-pick-list">${buttons}</div>
                </div>`;
            }
            if (ok.every((cj) => cj._link === "linked")) {
                const linked = ok.find((cj) => cj._linkedGuest);
                const guest = (linked && linked._linkedGuest) || "guest";
                const confSrc = ok.find((cj) => cj._linkedConf);
                const conf = confSrc && confSrc._linkedConf;
                const confHtml = conf ? ` <span class="link-conf">${escapeHtml(conf)}</span>` : "";
                return `<div class="extras-link-row link-success">✓ Linked to ${escapeHtml(guest)}${confHtml}
                    <button class="btn-link-mapro" type="button" onclick="startLinkMapro('${keyAttr}')" title="Link again">+ Add note</button>
                </div>`;
            }
            return `<div class="extras-link-row">
                <button class="btn-link-mapro" type="button" onclick="startLinkMapro('${keyAttr}')">+ Link MAPRO booking</button>
            </div>`;
        }

        function jobberExtrasHtml(u) {
            const j = u._jobber;
            if (!j) {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Loading…</div></div>`;
            }
            if (j.error === "extension_unreachable" || j.error === "no_extension_api") {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Install the MasterBot Bridge extension to enable Jobber.</div></div>`;
            }
            if (j.error === "no_address") {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Load the full address first.</div></div>`;
            }
            if (j.error) {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Error: ${escapeHtml(j.error)}</div></div>`;
            }
            if (!j.match) {
                const candidates = j.candidates || [];
                const tried = (j.tried || []).map((t) => `"${escapeHtml(t)}"`).join(", ");
                const manualInput = `<div class="extras-manual-search">
                    <input type="text" id="manual-search-${escapeHtml(u.key)}" placeholder="Search Jobber by name/address" ${j.searching ? "disabled" : ""}>
                    <button type="button" class="btn-extra" ${j.searching ? "disabled" : ""} onclick="manualJobberSearch('${escapeHtml(u.key)}')">${j.searching ? "Searching…" : "Search"}</button>
                </div>`;
                if (candidates.length === 0) {
                    return `<div class="unit-extras">
                        <div class="extras-label">Extras</div>
                        <div class="extras-empty">No Jobber property found.${tried ? ` Tried: ${tried}` : ""}</div>
                        ${manualInput}
                    </div>`;
                }
                const items = candidates.map((c, idx) => {
                    const street = c.street || c.propertyName || "";
                    const clientName = c.client && c.client.name || "";
                    return `<button class="extras-candidate" type="button" onclick="confirmJobberMatch('${escapeHtml(u.key)}', ${idx})">
                        <div class="cand-addr">${escapeHtml(street)}</div>
                        ${clientName ? `<div class="cand-client">${escapeHtml(clientName)}</div>` : ""}
                    </button>`;
                }).join("");
                return `<div class="unit-extras">
                    <div class="extras-label">Pick the matching Jobber property${tried ? ` <span class="extras-tried">(searched ${tried})</span>` : ""}</div>
                    <div class="extras-candidates">${items}</div>
                    ${manualInput}
                </div>`;
            }

            const matchLabel = escapeHtml(j.match.label || j.match.propertyId);
            const draft = u._extraDraft;
            const created = u._extraJobs || [];

            const createdHtml = created.length === 0 ? "" : `<div class="extras-created">${
                created.map((cj) => {
                    const numericId = decodeJobberId(cj.id);
                    const url = numericId ? `https://secure.getjobber.com/jobs/${encodeURIComponent(numericId)}` : "";
                    const display = cj.jobNumber || numericId;
                    const meta = [];
                    if (cj.assigneeName) meta.push(`<span class="created-meta"><span class="created-meta-label">Assigned:</span> ${escapeHtml(cj.assigneeName)}</span>`);
                    if (cj.member) meta.push(`<span class="created-meta"><span class="created-meta-label">Member:</span> ${escapeHtml(cj.member)}</span>`);
                    const numberHtml = display
                        ? `<span class="created-number copyable" data-copy="${escapeHtml(String(display))}" title="Click to copy">#${escapeHtml(String(display))}</span>`
                        : "";
                    const openBtn = url
                        ? `<a class="created-open" href="${url}" target="_blank" rel="noopener" title="Open in Jobber">↗</a>`
                        : "";
                    const linkedTag = cj._link === "linked"
                        ? `<span class="row-linked-tag" title="Linked to ${escapeHtml(cj._linkedGuest || "guest")}">linked</span>`
                        : "";
                    const idxAttr = created.indexOf(cj);
                    const svcHtml = (cj._link === "linked" && (maproServiceForJob(cj, u._extraJobs) || cj._svc))
                        ? renderSvcAction(u, cj, idxAttr)
                        : "";
                    // PH ON: mostra "(N nights)" se acharmos o partner PH OFF (mesmo
                    // antes de linkar — usa a regra: nights = OFF_date - ON_date - 1)
                    let phNightsTag = "";
                    if (isPoolHeatJob(cj.title || "") && isOnJob(cj.title || "") && cj.startAt) {
                        const offPartner = (u._extraJobs || []).find((j) =>
                            j !== cj &&
                            j.status === "ok" &&
                            isPoolHeatJob(j.title || "") &&
                            isOffJob(j.title || "") &&
                            j.startAt
                        );
                        if (offPartner) {
                            const ms = new Date(offPartner.startAt + "T00:00:00") - new Date(cj.startAt + "T00:00:00");
                            const nights = Math.round(ms / 86400000) - 1;
                            if (nights > 0) {
                                phNightsTag = ` <span class="ph-nights-tag" title="${escapeHtml(cj.startAt)} → ${escapeHtml(offPartner.startAt)} (turn-on/off days don't count)">${nights} night${nights === 1 ? "" : "s"}</span>`;
                            }
                        }
                    }
                    return `<div class="extras-created-row">
                        <span class="created-tag created-tag-${cj.status}">${cj.status === "ok" ? "✓" : "✗"}</span>
                        <span class="created-title">${escapeHtml(cj.title)}${phNightsTag}</span>
                        ${cj.status === "ok"
                            ? `${numberHtml}${openBtn}${linkedTag}${svcHtml}${meta.length ? `<span class="created-meta-group">${meta.join("")}</span>` : ""}`
                            : `<span class="created-error">${escapeHtml(cj.error || "")}</span>`
                        }
                    </div>`;
                }).join("")
            }${linkSectionHtml(u)}</div>`;

            let formHtml = "";
            if (!draft) {
                formHtml = `<div class="extras-actions">
                    <button class="btn-extra" type="button" onclick="startExtra('${escapeHtml(u.key)}','PH')">+ PH on/off</button>
                    <button class="btn-extra" type="button" onclick="startExtra('${escapeHtml(u.key)}','BBQ')">+ BBQ clean</button>
                    <button class="btn-extra" type="button" onclick="startExtra('${escapeHtml(u.key)}','EXTRAS')">+ Deliver / Pickup extras</button>
                </div>`;
            } else if (draft.type === "EXTRAS") {
                const info = detectAreaInfo(u, j.match);
                const detectedArea = info && info.area;
                const detectedNumber = info && info.number;
                const chosenArea = draft.area || detectedArea;
                const chosenNumber = draft.areaNumber != null ? draft.areaNumber : detectedNumber;
                const deliverDate = draft.deliverDate || todayIso();
                const pickupDate = draft.pickupDate || todayIso();
                const items = DEFAULT_EXTRA_ITEMS.map((it) => ({
                    ...it,
                    count: (draft.items && Number(draft.items[it.key])) || 0,
                }));
                const customItems = draft.customItems || [];
                const totalCount = items.reduce((a, b) => a + b.count, 0)
                    + customItems.reduce((a, c) => a + (Number(c.count) || 0), 0);
                const deliverTitle = buildExtrasTitle("Deliver", items, customItems);
                const pickupTitle = buildExtrasTitle("Pickup", items, customItems);
                const deliverAssignees = chosenArea ? computeDeliverPickupAssignees(chosenArea, chosenNumber, deliverDate) : [];
                const pickupAssignees = chosenArea ? computeDeliverPickupAssignees(chosenArea, chosenNumber, pickupDate) : [];
                const areaWarn = !chosenArea ? `<div class="extras-warn">⚠ Couldn't detect West/East — pick one</div>` : "";
                const areaPicker = `<div class="extras-area-picker">
                    <span class="extras-area-label">Area:</span>
                    <button type="button" class="btn-area ${chosenArea === "West" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','West')">West</button>
                    <button type="button" class="btn-area ${chosenArea === "East" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','East')">East</button>
                    ${chosenArea ? `<span class="extras-area-num">#<input type="number" min="1" max="20" id="ext-num-${escapeHtml(u.key)}" value="${escapeHtml(String(chosenNumber || ""))}" oninput="setExtraAreaNumber('${escapeHtml(u.key)}', this.value)" class="area-num-input"></span>` : ""}
                    ${detectedArea && !draft.area ? `<span class="extras-area-auto">auto-detected</span>` : ""}
                </div>`;
                const itemRows = items.map((it) => `
                    <div class="extras-item-row">
                        <span class="extras-item-label">${escapeHtml(it.label)}</span>
                        <input type="number" min="0" max="99" value="${it.count}" oninput="setExtraItem('${escapeHtml(u.key)}','${escapeHtml(it.key)}', this.value)" class="area-num-input">
                    </div>
                `).join("");
                const customRows = customItems.map((c, idx) => `
                    <div class="extras-item-row">
                        <input type="text" placeholder="item name" value="${escapeHtml(c.label || "")}" oninput="setExtraCustomItem('${escapeHtml(u.key)}', ${idx}, 'label', this.value)" class="extras-item-name">
                        <input type="number" min="0" max="99" value="${Number(c.count) || 0}" oninput="setExtraCustomItem('${escapeHtml(u.key)}', ${idx}, 'count', this.value)" class="area-num-input">
                        <button type="button" class="btn-link" onclick="removeExtraCustomItem('${escapeHtml(u.key)}', ${idx})">remove</button>
                    </div>
                `).join("");
                const previewHtml = chosenArea && totalCount > 0 ? `<div class="extras-preview">
                    <div><span class="created-meta-label">Deliver →</span> ${escapeHtml(deliverTitle)} · ${escapeHtml(labelsFromTeamIds(deliverAssignees).join(" + ") || "(no team)")}</div>
                    <div><span class="created-meta-label">Pickup →</span> ${escapeHtml(pickupTitle)} · ${escapeHtml(labelsFromTeamIds(pickupAssignees).join(" + ") || "(no team)")}</div>
                </div>` : "";
                const canSubmit = !!chosenArea && totalCount > 0 && !draft.submitting;
                formHtml = `<div class="extras-form">
                    <label>Deliver date <input type="date" id="ext-deliver-${escapeHtml(u.key)}" value="${escapeHtml(deliverDate)}" oninput="setExtraDate('${escapeHtml(u.key)}','deliverDate', this.value)" onclick="try{this.showPicker()}catch(_){}"></label>
                    <label>Pickup date <input type="date" id="ext-pickup-${escapeHtml(u.key)}" value="${escapeHtml(pickupDate)}" oninput="setExtraDate('${escapeHtml(u.key)}','pickupDate', this.value)" onclick="try{this.showPicker()}catch(_){}"></label>
                    ${areaPicker}
                    ${areaWarn}
                    <div class="extras-items">
                        ${itemRows}
                        ${customRows}
                        <button type="button" class="btn-link" onclick="addExtraCustomItem('${escapeHtml(u.key)}')">+ Add item</button>
                    </div>
                    ${previewHtml}
                    <div class="extras-form-actions">
                        <button class="btn-extra btn-extra-primary" type="button" ${canSubmit ? "" : "disabled"} onclick="submitExtraDeliverPickup('${escapeHtml(u.key)}')">${draft.submitting ? "Creating…" : "Create both"}</button>
                        <button class="btn-extra-cancel" type="button" onclick="cancelExtra('${escapeHtml(u.key)}')">Cancel</button>
                    </div>
                </div>`;
            } else if (draft.type === "PH") {
                const info = detectAreaInfo(u, j.match);
                const detectedArea = info && info.area;
                const detectedNumber = info && info.number;
                const chosenArea = draft.area || detectedArea;
                const chosenNumber = draft.areaNumber != null ? draft.areaNumber : detectedNumber;
                const areaWarn = !chosenArea ? `<div class="extras-warn">⚠ Couldn't detect West/East — pick one</div>` : "";
                const areaPicker = `<div class="extras-area-picker">
                    <span class="extras-area-label">Area:</span>
                    <button type="button" class="btn-area ${chosenArea === "West" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','West')">West</button>
                    <button type="button" class="btn-area ${chosenArea === "East" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','East')">East</button>
                    ${chosenArea ? `<span class="extras-area-num">#<input type="number" min="1" max="20" id="ph-num-${escapeHtml(u.key)}" value="${escapeHtml(String(chosenNumber || ""))}" oninput="setExtraAreaNumber('${escapeHtml(u.key)}', this.value)" class="area-num-input"></span>` : ""}
                    ${detectedArea && !draft.area ? `<span class="extras-area-auto">auto-detected</span>` : ""}
                </div>`;
                const onDate = draft.onDate || todayIso();
                const offDate = draft.offDate || todayIso();
                const onAssignees = chosenArea ? computePHOnAssignees(chosenArea, chosenNumber, onDate) : [];
                const offAssignees = chosenArea ? computePHOffAssignees(chosenArea) : [];
                const onLabels = labelsFromTeamIds(onAssignees);
                const offLabels = labelsFromTeamIds(offAssignees);
                const conflicts = findPHConflicts(draft.existingPHJobs, onDate, offDate);
                const conflictsHtml = draft.loadingExisting
                    ? `<div class="extras-preview-muted">Checking existing PH jobs…</div>`
                    : (conflicts.length
                        ? `<div class="extras-conflicts">
                                <div class="extras-conflicts-title">⚠ ${conflicts.length} existing PH job${conflicts.length > 1 ? "s" : ""} between these dates:</div>
                                ${conflicts.map((c) => {
                                    const numericId = decodeJobberId(c.id);
                                    const url = numericId ? `https://secure.getjobber.com/jobs/${encodeURIComponent(numericId)}` : "";
                                    return `<div class="extras-conflict-row">
                                        <span>${escapeHtml(c.title)} on ${escapeHtml(c.startDate)}</span>
                                        ${url ? `<a class="created-open" href="${url}" target="_blank" rel="noopener">#${escapeHtml(String(c.jobNumber || numericId))} ↗</a>` : ""}
                                    </div>`;
                                }).join("")}
                            </div>`
                        : "");
                // Quantas nights de pool heat? (ON+1 até OFF-0 = OFF - ON - 1)
                let phNightsHtml = "";
                if (onDate && offDate) {
                    const ms = new Date(offDate + "T00:00:00") - new Date(onDate + "T00:00:00");
                    const nights = Math.round(ms / 86400000) - 1;
                    if (nights > 0) {
                        phNightsHtml = `<div class="ph-nights-preview"><span class="ph-nights-tag">${nights} night${nights === 1 ? "" : "s"}</span> heated (${escapeHtml(onDate)} → ${escapeHtml(offDate)}, turn-on/off days don't count)</div>`;
                    } else if (nights === 0) {
                        phNightsHtml = `<div class="extras-warn">⚠ ON and OFF are consecutive — 0 nights heated</div>`;
                    } else {
                        phNightsHtml = `<div class="extras-warn">⚠ OFF date must be after ON date</div>`;
                    }
                }
                const previewHtml = chosenArea ? `<div class="extras-preview">
                    ${phNightsHtml}
                    <div><span class="created-meta-label">PH ON →</span> ${escapeHtml(onLabels.join(" + ") || "(no team)")}</div>
                    <div><span class="created-meta-label">PH OFF →</span> ${escapeHtml(offLabels.join(" + ") || "(no team)")}</div>
                </div>` : phNightsHtml;
                const canSubmit = !!chosenArea && !draft.submitting && !draft.loadingExisting;
                const createLabel = draft.submitting ? "Creating…" : (conflicts.length ? "Create anyway" : "Create");
                formHtml = `<div class="extras-form">
                    <label>PH ON date <input type="date" id="ph-on-${escapeHtml(u.key)}" value="${escapeHtml(onDate)}" oninput="setExtraDate('${escapeHtml(u.key)}','onDate', this.value)" onclick="try{this.showPicker()}catch(_){}"></label>
                    <label>PH OFF date <input type="date" id="ph-off-${escapeHtml(u.key)}" value="${escapeHtml(offDate)}" oninput="setExtraDate('${escapeHtml(u.key)}','offDate', this.value)" onclick="try{this.showPicker()}catch(_){}"></label>
                    ${areaPicker}
                    ${areaWarn}
                    ${conflictsHtml}
                    ${previewHtml}
                    <div class="extras-form-actions">
                        <button class="btn-extra ${conflicts.length ? "btn-extra-warn" : "btn-extra-primary"}" type="button" ${canSubmit ? "" : "disabled"} onclick="submitExtraPH('${escapeHtml(u.key)}')">${createLabel}</button>
                        <button class="btn-extra-cancel" type="button" onclick="cancelExtra('${escapeHtml(u.key)}')">Cancel</button>
                    </div>
                </div>`;
            } else if (draft.type === "BBQ") {
                const detected = detectAreaSuffix(u, j.match);
                const chosen = draft.area || detected;
                const areaWarn = !chosen ? `<div class="extras-warn">⚠ Couldn't detect West/East — pick one</div>` : "";
                const areaPicker = `<div class="extras-area-picker">
                    <span class="extras-area-label">Area:</span>
                    <button type="button" class="btn-area ${chosen === "West" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','West')">West</button>
                    <button type="button" class="btn-area ${chosen === "East" ? "btn-area-active" : ""}" onclick="setExtraArea('${escapeHtml(u.key)}','East')">East</button>
                    ${detected && !draft.area ? `<span class="extras-area-auto">auto-detected</span>` : ""}
                </div>`;
                const canSubmit = !!chosen && !draft.submitting;
                const bbqDate = draft.date || todayIso();
                const bbqWarnHtml = bbqDateWarning(u, bbqDate);
                formHtml = `<div class="extras-form">
                    <label>BBQ date <input type="date" id="bbq-${escapeHtml(u.key)}" value="${escapeHtml(bbqDate)}"
                        onchange="bbqDateChanged('${escapeHtml(u.key)}')"
                        onclick="try{this.showPicker()}catch(_){}"></label>
                    ${bbqWarnHtml}
                    ${areaPicker}
                    ${areaWarn}
                    <div class="extras-form-actions">
                        <button class="btn-extra btn-extra-primary" type="button" ${canSubmit ? "" : "disabled"} onclick="submitExtraBBQ('${escapeHtml(u.key)}')">${draft.submitting ? "Creating…" : `Create${chosen ? ` (BBQ/PW-${chosen})` : ""}`}</button>
                        <button class="btn-extra-cancel" type="button" onclick="cancelExtra('${escapeHtml(u.key)}')">Cancel</button>
                    </div>
                </div>`;
            }

            return `<div class="unit-extras">
                <div class="extras-label">Extras
                    <span class="extras-match">→ ${matchLabel} <button class="btn-link" type="button" onclick="clearJobberMatch('${escapeHtml(u.key)}')">unlink</button></span>
                </div>
                ${formHtml}
                ${createdHtml}
            </div>`;
        }

        const CREATE_JOB_MUTATION = `mutation CreateJob($input: JobCreateAttributes!) {
            jobCreate(input: $input) {
                job {
                    id
                    jobNumber
                    title
                    visits(first: 1) { nodes { id } }
                }
                userErrors { message path }
            }
        }`;

        const JOBBER_BBQ_TEAM_IDS = { West: "MTcyMjQwMg==", East: "NjUwNTcz" };
        const JOBBER_TEAM_IDS = {
            "PH WEST": "MTI2MzkxNQ==",
            "PH EAST": "OTIxNzQ2",
            "AFTER GUEST REPORT - WEST": "MTcxMDM0NA==",
            "AFTER GUEST REPORT - EAST": "NjUwNTc0",
            "WEST 1": "NjUwNTY2",
            "WEST 2": "NjUwNTY3",
            "WEST 3": "NjUwNTY4",
            "WEST 4": "MTc3NzcwMA==",
            "WEST 5": "MTg3ODY0MA==",
            "WEST 6": "MTg5NjM3OA==",
            "WEST 7": "MTk4OTY1OA==",
            "WEST 8": "MjExNDc0Mg==",
            "EAST 1": "NjUwNTY0",
            "EAST 2": "NjUwNTY1",
            "EAST 3": "MTg3ODc5Nw==",
            "EAST 4": "MjEwNDU1NA==",
            "EAST 5": "MjcxNjkzNA==",
        };
        const JOBBER_TEAM_NAMES = Object.fromEntries(Object.entries(JOBBER_TEAM_IDS).map(([name, id]) => [id, name]));

        function computePHOnAssignees(area, areaNumber, dateIso) {
            const upper = area.toUpperCase();
            const phId = JOBBER_TEAM_IDS[`PH ${upper}`];
            const sameDay = isSameDayIso(dateIso);
            if (!sameDay) {
                return phId ? [phId] : [];
            }
            if (isBefore330LocalTime()) {
                const areaId = areaNumber ? JOBBER_TEAM_IDS[`${upper} ${areaNumber}`] : null;
                return [phId, areaId].filter(Boolean);
            }
            const afterId = JOBBER_TEAM_IDS[`AFTER GUEST REPORT - ${upper}`];
            return afterId ? [afterId] : [];
        }

        function computePHOffAssignees(area) {
            const phId = JOBBER_TEAM_IDS[`PH ${area.toUpperCase()}`];
            return phId ? [phId] : [];
        }

        function computeDeliverPickupAssignees(area, areaNumber, dateIso) {
            const upper = area.toUpperCase();
            if (isSameDayIso(dateIso) && !isBefore330LocalTime()) {
                const afterId = JOBBER_TEAM_IDS[`AFTER GUEST REPORT - ${upper}`];
                return afterId ? [afterId] : [];
            }
            const areaId = areaNumber ? JOBBER_TEAM_IDS[`${upper} ${areaNumber}`] : null;
            return areaId ? [areaId] : [];
        }

        const DEFAULT_EXTRA_ITEMS = [
            { key: "pack_and_play", label: "Pack and play" },
            { key: "high_chair", label: "High chair" },
        ];

        function buildExtrasTitle(action, items, customItems) {
            const parts = [];
            const fmt = (count, name) => `${count} ${count === 1 ? "extra" : "extras"} ${String(name || "").toLowerCase()}`;
            for (const i of items) {
                if (i.count > 0) parts.push(fmt(i.count, i.label));
            }
            for (const c of (customItems || [])) {
                const name = (c.label || "").trim();
                const count = Number(c.count) || 0;
                if (name && count > 0) parts.push(fmt(count, name));
            }
            return parts.length ? `${action} ${parts.join(" + ")}` : action;
        }

        function labelsFromTeamIds(ids) {
            return (ids || []).map((id) => JOBBER_TEAM_NAMES[id] || id);
        }

        const PH_JOB_TITLES = new Set(["PH ON", "PH OFF"]);

        async function fetchPropertyPHJobs(clientId, propertyId) {
            if (!clientId || !propertyId) return [];
            try {
                const data = await jobberQuery(
                    "MasterBotPropertyJobs",
                    `query MasterBotPropertyJobs($clientId: EncodedId!, $propertyIds: [EncodedId!], $first: Int) {
                        client(id: $clientId) {
                            id
                            requestedWorkObjects(
                                first: $first
                                filter: { types: [JOB], propertyIds: $propertyIds, status: ALL }
                            ) {
                                edges {
                                    node {
                                        __typename
                                        ... on Job {
                                            id
                                            jobNumber
                                            jobStatus
                                            startAt
                                            title
                                        }
                                    }
                                }
                            }
                        }
                    }`,
                    { clientId, propertyIds: [propertyId], first: 50 }
                );
                const edges = (data && data.client && data.client.requestedWorkObjects && data.client.requestedWorkObjects.edges) || [];
                return edges
                    .map((e) => e.node)
                    .filter((n) => n && n.__typename === "Job" && PH_JOB_TITLES.has(n.title))
                    .map((n) => ({
                        id: n.id,
                        jobNumber: n.jobNumber,
                        title: n.title,
                        jobStatus: n.jobStatus,
                        startAt: n.startAt,
                        startDate: (n.startAt || "").slice(0, 10),
                    }));
            } catch (_) {
                return [];
            }
        }

        function findPHConflicts(existing, onDate, offDate) {
            if (!onDate || !offDate || !existing || !existing.length) return [];
            const lo = onDate < offDate ? onDate : offDate;
            const hi = onDate < offDate ? offDate : onDate;
            return existing.filter((j) => j.startDate >= lo && j.startDate <= hi && j.jobStatus !== "archived");
        }

        function decodeJobberId(encoded) {
            try { return atob(String(encoded || "")).replace(/^\D+/, ""); }
            catch (_) { return ""; }
        }

        function detectAreaSuffix(u, match) {
            const info = detectAreaInfo(u, match);
            return info && info.area;
        }

        function detectAreaInfo(u, match) {
            const sources = [
                match && match.clientName,
                match && match.propertyName,
                match && match.label,
                u && u.code,
                u && u.title,
                u && (u._fullAddress || u.address),
                u && u.resort,
                u && u.homeowner,
            ];
            for (const s of sources) {
                const m = String(s || "").match(/\b([WE])(\d+)\b/);
                if (m) {
                    return {
                        area: m[1].toUpperCase() === "W" ? "West" : "East",
                        number: m[2],
                    };
                }
            }
            return null;
        }

        function isSameDayIso(iso) {
            return iso === todayIso();
        }

        function isBefore330LocalTime() {
            const now = new Date();
            const minutes = now.getHours() * 60 + now.getMinutes();
            return minutes < (15 * 60 + 30);
        }

        function fmtMonthDay(iso) {
            if (!iso) return "";
            const parts = iso.split("-");
            if (parts.length !== 3) return iso;
            return `${Number(parts[1])}/${Number(parts[2])}`;
        }

        let _jobberMember = null;
        let _memberOptions = null;
        const JOBBER_MEMBER_CACHE_KEY = "masterbotJobberMember";
        const JOBBER_MEMBER_VERSION_KEY = "masterbotJobberMemberV";
        const JOBBER_MEMBER_VERSION = "v3";
        if (localStorage.getItem(JOBBER_MEMBER_VERSION_KEY) !== JOBBER_MEMBER_VERSION) {
            localStorage.removeItem(JOBBER_MEMBER_CACHE_KEY);
            localStorage.setItem(JOBBER_MEMBER_VERSION_KEY, JOBBER_MEMBER_VERSION);
        }

        async function fetchMemberOptions(propertyId, clientId) {
            if (_memberOptions) return _memberOptions;
            try {
                const data = await jobberQuery(
                    "JobDefaultCustomFieldValues",
                    `query JobDefaultCustomFieldValues($clientId: EncodedId, $propertyId: EncodedId) {
                        jobDefaultCustomFieldValues(clientId: $clientId, propertyId: $propertyId) {
                            nodes {
                                __typename
                                ... on CustomFieldDropdown {
                                    label
                                    dropdownOptions
                                    customFieldConfiguration { id __typename }
                                }
                            }
                        }
                    }`,
                    { clientId: clientId || null, propertyId: propertyId || null }
                );
                const nodes = (data && data.jobDefaultCustomFieldValues && data.jobDefaultCustomFieldValues.nodes) || [];
                const member = nodes.find((n) => n && n.__typename === "CustomFieldDropdown" && n.label === "Member");
                _memberOptions = (member && member.dropdownOptions) || [];
            } catch (_) {
                _memberOptions = [];
            }
            return _memberOptions;
        }

        function matchMemberOption(candidate, options) {
            if (!candidate || !Array.isArray(options) || !options.length) return null;
            const norm = (s) => String(s || "").trim().toLowerCase();
            const c = norm(candidate);
            if (!c) return null;
            const exact = options.find((o) => norm(o) === c);
            if (exact) return exact;
            const startsWith = options.find((o) => norm(o).startsWith(c) || c.startsWith(norm(o)));
            if (startsWith) return startsWith;
            const tokens = c.split(/\s+/).filter(Boolean);
            const containsAll = options.find((o) => {
                const on = norm(o);
                return tokens.every((t) => on.includes(t));
            });
            return containsAll || null;
        }

        async function fetchJobberMember() {
            if (_jobberMember) return _jobberMember;
            const cached = localStorage.getItem(JOBBER_MEMBER_CACHE_KEY);
            if (cached) {
                _jobberMember = cached;
                return cached;
            }
            try {
                const data = await jobberQuery(
                    "JobberCurrentAccount",
                    `query JobberCurrentAccount {
                        account {
                            currentUser {
                                id
                                name { first full last }
                            }
                        }
                    }`,
                    {}
                );
                const user = data && data.account && data.account.currentUser;
                const nm = user && user.name;
                const name = (nm && (nm.full || [nm.first, nm.last].filter(Boolean).join(" "))) || "";
                if (name) {
                    _jobberMember = name;
                    localStorage.setItem(JOBBER_MEMBER_CACHE_KEY, name);
                    return name;
                }
            } catch (_) {}
            return null;
        }

        async function createJobberJob({ propertyId, title, startAt, assigneeName, assignedTo, clientId }) {
            const memberFromJobber = await fetchJobberMember();
            const yourName = (localStorage.getItem("yourName") || "").trim();
            const options = await fetchMemberOptions(propertyId, clientId);
            const candidates = [memberFromJobber, yourName].filter(Boolean);
            let memberName = "";
            for (const c of candidates) {
                const match = matchMemberOption(c, options);
                if (match) { memberName = match; break; }
            }
            if (!memberName && candidates.length && (!options || !options.length)) {
                memberName = candidates[0];
            }
            const customFields = memberName ? [{
                valueDropdown: memberName,
                customFieldConfigurationId: "MzY0NTQ2",
            }] : [];
            const who = (assigneeName || title || "").trim();
            const noteMessage = `${fmtMonthDay(startAt)} | ${who}`.trim();
            const notes = noteMessage ? [{
                attachments: [],
                linkedTo: { invoices: true },
                message: noteMessage,
            }] : [];

            const input = {
                customFields,
                instructions: "",
                invoicing: { invoicingSchedule: "NEVER", invoicingType: "FIXED_PRICE" },
                jobFormIds: [],
                jobType: "ONE_OFF",
                lineItems: [],
                notes,
                progressInvoicingSchedule: null,
                propertyId,
                salespersonId: null,
                scheduling: { assignedTo: Array.isArray(assignedTo) ? assignedTo : [], createVisits: true, notifyTeam: false },
                timeframe: { durationUnits: "DAYS", durationValue: 0, startAt },
                title,
                trackingOrigin: "property",
            };
            const data = await jobberQuery("CreateJob", CREATE_JOB_MUTATION, { input });
            const errs = data?.jobCreate?.userErrors || [];
            if (errs.length) throw new Error(errs.map((e) => e.message).join("; "));
            return data?.jobCreate?.job;
        }

        window.startExtra = function (key, type) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._jobber || !u._jobber.match) return;
            u._extraDraft = { type, date: todayIso() };
            if (type === "BBQ") {
                ensureMaproServicesForStays(u);
            }
            if (type === "PH") {
                u._extraDraft.existingPHJobs = null;
                u._extraDraft.loadingExisting = true;
                fetchPropertyPHJobs(u._jobber.match.clientId, u._jobber.match.propertyId)
                    .then((jobs) => {
                        if (u._extraDraft && u._extraDraft.type === "PH") {
                            u._extraDraft.existingPHJobs = jobs;
                        }
                    })
                    .catch((e) => {
                        console.error("[MB] fetchPropertyPHJobs failed:", e);
                        if (u._extraDraft && u._extraDraft.type === "PH") {
                            u._extraDraft.existingPHJobs = [];
                            u._extraDraft.phLoadError = (e && e.message) || String(e);
                        }
                    })
                    .finally(() => {
                        if (u._extraDraft && u._extraDraft.type === "PH") {
                            u._extraDraft.loadingExisting = false;
                            render();
                        }
                    });
            }
            render();
        };

        window.cancelExtra = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            u._extraDraft = null;
            render();
        };

        function readDateInput(id) {
            const el = document.getElementById(id);
            return el ? el.value : "";
        }

        async function runCreateAndRecord(u, jobs) {
            u._extraDraft.submitting = true;
            render();
            u._extraJobs = u._extraJobs || [];
            const propertyId = u._jobber.match.propertyId;
            const clientId = u._jobber.match.clientId;
            const memberFromJobber = await fetchJobberMember();
            const yourName = (localStorage.getItem("yourName") || "").trim();
            const options = await fetchMemberOptions(propertyId, clientId);
            let resolvedMember = "";
            for (const c of [memberFromJobber, yourName].filter(Boolean)) {
                const m = matchMemberOption(c, options);
                if (m) { resolvedMember = m; break; }
            }
            if (!resolvedMember) resolvedMember = memberFromJobber || yourName || "";
            for (const j of jobs) {
                try {
                    const created = await createJobberJob({
                        propertyId,
                        clientId,
                        title: j.title,
                        startAt: j.startAt,
                        assigneeName: j.assigneeName,
                        assignedTo: j.assignedTo,
                    });
                    u._extraJobs.push({
                        status: "ok",
                        title: j.title,
                        id: created?.id,
                        jobNumber: created?.jobNumber,
                        startAt: j.startAt,
                        assigneeName: j.assigneeName || "",
                        member: resolvedMember,
                    });
                } catch (e) {
                    u._extraJobs.push({
                        status: "err",
                        title: j.title,
                        error: e?.message || String(e),
                        startAt: j.startAt,
                        assigneeName: j.assigneeName || "",
                        member: resolvedMember,
                    });
                }
            }
            u._extraDraft = null;
            render();
        }

        window.submitExtraPH = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const onDate = readDateInput(`ph-on-${key}`) || u._extraDraft.onDate;
            const offDate = readDateInput(`ph-off-${key}`) || u._extraDraft.offDate;
            if (!onDate || !offDate) { showToast("Pick both dates"); return; }
            const info = detectAreaInfo(u, u._jobber && u._jobber.match);
            const area = u._extraDraft.area || (info && info.area);
            const areaNumber = u._extraDraft.areaNumber != null ? u._extraDraft.areaNumber : (info && info.number);
            if (!area) { showToast("Pick West or East"); return; }
            const onAssignees = computePHOnAssignees(area, areaNumber, onDate);
            const offAssignees = computePHOffAssignees(area);
            const onLabel = labelsFromTeamIds(onAssignees).join(" + ") || `PH ${area}`;
            const offLabel = labelsFromTeamIds(offAssignees).join(" + ") || `PH ${area}`;
            runCreateAndRecord(u, [
                { title: "PH ON", startAt: onDate, assigneeName: onLabel, assignedTo: onAssignees },
                { title: "PH OFF", startAt: offDate, assigneeName: offLabel, assignedTo: offAssignees },
            ]);
        };

        window.setExtraArea = function (key, area) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.area = area;
            render();
        };

        window.setExtraAreaNumber = function (key, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.areaNumber = String(value || "").trim() || null;
            render();
        };

        window.setExtraDate = function (key, field, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft[field] = value;
            render();
        };

        window.setExtraItem = function (key, itemKey, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.items = u._extraDraft.items || {};
            u._extraDraft.items[itemKey] = Math.max(0, Number(value) || 0);
            render();
        };

        window.addExtraCustomItem = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.customItems = u._extraDraft.customItems || [];
            u._extraDraft.customItems.push({ label: "", count: 1 });
            render();
        };

        window.removeExtraCustomItem = function (key, idx) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || !u._extraDraft.customItems) return;
            u._extraDraft.customItems.splice(Number(idx), 1);
            render();
        };

        window.setExtraCustomItem = function (key, idx, field, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || !u._extraDraft.customItems) return;
            const item = u._extraDraft.customItems[Number(idx)];
            if (!item) return;
            item[field] = field === "count" ? Math.max(0, Number(value) || 0) : value;
            render();
        };

        window.submitExtraDeliverPickup = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const draft = u._extraDraft;
            const deliverDate = draft.deliverDate || todayIso();
