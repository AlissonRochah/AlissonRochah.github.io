            const pickupDate = draft.pickupDate || todayIso();
            const info = detectAreaInfo(u, u._jobber && u._jobber.match);
            const area = draft.area || (info && info.area);
            const areaNumber = draft.areaNumber != null ? draft.areaNumber : (info && info.number);
            if (!area) { showToast("Pick West or East"); return; }
            const items = DEFAULT_EXTRA_ITEMS.map((it) => ({
                ...it,
                count: (draft.items && Number(draft.items[it.key])) || 0,
            }));
            const customItems = (draft.customItems || []).filter((c) => (c.label || "").trim() && Number(c.count) > 0);
            const total = items.reduce((a, b) => a + b.count, 0) + customItems.reduce((a, c) => a + Number(c.count), 0);
            if (total <= 0) { showToast("Pick at least 1 item"); return; }
            const deliverTitle = buildExtrasTitle("Deliver", items, customItems);
            const pickupTitle = buildExtrasTitle("Pickup", items, customItems);
            const deliverAssignees = computeDeliverPickupAssignees(area, areaNumber, deliverDate);
            const pickupAssignees = computeDeliverPickupAssignees(area, areaNumber, pickupDate);
            const deliverLabel = labelsFromTeamIds(deliverAssignees).join(" + ") || `${area} ${areaNumber || ""}`.trim();
            const pickupLabel = labelsFromTeamIds(pickupAssignees).join(" + ") || `${area} ${areaNumber || ""}`.trim();
            runCreateAndRecord(u, [
                { title: deliverTitle, startAt: deliverDate, assigneeName: deliverLabel, assignedTo: deliverAssignees },
                { title: pickupTitle, startAt: pickupDate, assigneeName: pickupLabel, assignedTo: pickupAssignees },
            ]);
        };

        window.bbqDateChanged = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.type !== "BBQ") return;
            const inp = document.getElementById(`bbq-${key}`);
            u._extraDraft.date = inp ? inp.value : "";
            render();
        };

        window.submitExtraBBQ = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const date = readDateInput(`bbq-${key}`);
            if (!date) { showToast("Pick a date"); return; }
            // Última checagem antes de criar — caso a UI não tenha re-renderizado
            const dup = findBBQDuplicateForDate(u, date);
            if (dup && !confirm(`Já existe ${dup.service.label} no MAPRO pra ${date}. Criar BBQ no Jobber mesmo assim?`)) return;
            const area = u._extraDraft.area || detectAreaSuffix(u, u._jobber && u._jobber.match);
            if (!area) { showToast("Pick West or East"); return; }
            const assigneeName = `BBQ/PW-${area}`;
            const teamId = JOBBER_BBQ_TEAM_IDS[area];
            const assignedTo = teamId ? [teamId] : [];
            runCreateAndRecord(u, [
                { title: "BBQ Clean", startAt: date, assigneeName, assignedTo },
            ]);
        };

        window.addMaproService = async function (key, idx) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraJobs || !u._extraJobs[idx]) return;
            const cj = u._extraJobs[idx];
            if (!cj._linkedReservaId) { showToast("Link MAPRO booking first"); return; }
            const action = maproServiceForJob(cj, u._extraJobs);
            if (!action) { showToast("No service mapping for this job"); return; }
            const partner = (action.partnerIdx != null) ? u._extraJobs[action.partnerIdx] : null;
            cj._svc = "busy";
            cj._svcError = null;
            if (partner) { partner._svc = "busy"; partner._svcError = null; }
            render();
            try {
                let data = await maproAddService(cj._linkedReservaId, action.kind, action.price, action.startDate, action.endDate);
                if (data && data.status === "duplicate") {
                    const msg = `Já tem "${data.existingLabel}" no dia ${data.existingDate} nessa reserva. Adicionar outro mesmo assim?`;
                    if (!confirm(msg)) {
                        cj._svc = null;
                        cj._svcError = null;
                        if (partner) { partner._svc = null; partner._svcError = null; }
                        render();
                        return;
                    }
                    cj._svc = "busy";
                    if (partner) partner._svc = "busy";
                    render();
                    data = await maproAddService(cj._linkedReservaId, action.kind, action.price, action.startDate, action.endDate, { force: true });
                }
                cj._svc = "done";
                cj._svcLabel = data && data.serviceLabel;
                if (partner) {
                    partner._svc = "done";
                    partner._svcLabel = data && data.serviceLabel;
                }
            } catch (e) {
                const msg = (e && e.message) || String(e);
                cj._svc = "error";
                cj._svcError = msg;
                if (partner) { partner._svc = "error"; partner._svcError = msg; }
            }
            render();
        };

        window.startLinkMapro = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraJobs) return;
            for (const cj of u._extraJobs) {
                if (cj._link === "error") { cj._link = null; cj._linkError = null; }
            }
            u._maproPanelOpen = true;
            u._maproPanelStep = "link";
            if (u._paymentLinkValue == null) u._paymentLinkValue = "";
            // Já dispara o fetch dos stays em background — quando user avançar pra step 2
            // já estarão prontos (ou no pior caso ainda carregando).
            const isPhOnJob = (cj) => {
                const t = String(cj.title || "");
                return isPoolHeatJob(t) && isOnJob(t);
            };
            const okUnlinked = u._extraJobs.filter((cj) => cj.status === "ok" && cj._link !== "linked");
            const refCj = okUnlinked.find((cj) => !isPhOnJob(cj)) || okUnlinked[0] || null;
            const ref = refCj?.startAt || null;
            fetchLinkStays(u, ref);
            render();
            // Foca no input pra o user já começar a digitar
            setTimeout(() => {
                const inp = document.getElementById("payment-link-" + key);
                if (inp) inp.focus();
            }, 50);
        };

        window.advanceLinkMapro = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            const inp = document.getElementById("payment-link-" + key);
            const link = inp ? inp.value.trim() : "";
            if (!link && !confirm("Continue without payment link?")) return;
            u._paymentLinkValue = link;
            u._maproPanelStep = "guest";
            render();
        };

        window.cancelLinkMapro = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            u._maproPanelOpen = false;
            if (u._extraJobs) {
                for (const cj of u._extraJobs) {
                    if (cj._link === "error") { cj._link = null; cj._linkError = null; }
                }
            }
            render();
        };

        window.confirmLinkMapro = async function (key, reservaId) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraJobs) return;
            if (!u.idMAPRO) { showToast("Unit has no MAPRO id"); return; }
            // Já garantimos no advanceLinkMapro que tem (ou foi confirmado vazio)
            const paymentLink = u._paymentLinkValue || "";
            const targets = u._extraJobs.filter((cj) => cj.status === "ok" && cj._link !== "linked");
            if (targets.length === 0) { showToast("Nothing to link"); return; }
            const stays = u._linkStays || {};
            const stay = [stays.previous, stays.active, stays.next].find((s) => s && Number(s.id) === Number(reservaId));
            for (const cj of targets) cj._link = "linking";
            u._maproPanelOpen = false;
            render();
            try {
                const lines = [];
                if (paymentLink) lines.push(paymentLink);
                for (const cj of targets) {
                    const num = cj.jobNumber || decodeJobberId(cj.id) || "";
                    lines.push(`${cj.title} - ${num}`);
                }
                const comment = lines.join("\n\n");
                await maproAddComment(reservaId, u.idMAPRO, comment);
                const guest = (stay && stay.guest) || "";
                const conf = (stay && stay.confirmation) || "";
                for (const cj of targets) {
                    cj._link = "linked";
                    cj._linkedGuest = guest;
                    cj._linkedConf = conf;
                    cj._linkedReservaId = reservaId;
                }
                render();
                // Auto-roda os serviços MAPRO pra cada job linkado que tem um mapeamento
                // (BBQ, PH On — PH Off é processado junto via partner)
                const indicesToAdd = [];
                for (let i = 0; i < u._extraJobs.length; i++) {
                    const cj = u._extraJobs[i];
                    if (cj._link !== "linked") continue;
                    if (cj._svc === "done" || cj._svc === "busy") continue;
                    if (!maproServiceForJob(cj, u._extraJobs)) continue;
                    indicesToAdd.push(i);
                }
                for (const i of indicesToAdd) {
                    await window.addMaproService(key, i);
                }
            } catch (e) {
                const msg = (e && e.message) || String(e);
                for (const cj of targets) {
                    cj._link = "error";
                    cj._linkError = msg;
                }
                render();
            }
        };

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast("Copied: " + text);
            } catch (_) {
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand("copy"); showToast("Copied: " + text); } catch (__) {}
                document.body.removeChild(ta);
            }
        }

        function extrasHtml(u) {
            const parts = [];
            if (u.bbq) parts.push('<span class="extra-pill extra-bbq">BBQ</span>');
            if (u.poolHeater) parts.push(`<span class="extra-pill extra-ph">PH $${u.poolHeater}</span>`);
            return parts.join(" ");
        }

        function render() {
            const tbody = document.getElementById("units-tbody");
            if (filteredUnits.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty">No units match your search.</td></tr>`;
                return;
            }
            tbody.innerHTML = filteredUnits.map((u) => {
                const expanded = expandedKey === u.key;
                const maproUrl = `https://app.mapro.us/manage/houses/register/${encodeURIComponent(u.idMAPRO || u.key)}`;
                return `
                    <tr class="unit-row ${expanded ? "expanded" : ""}" data-key="${escapeHtml(u.key)}">
                        <td class="col-thumb">${imageThumb(u.image)}</td>
                        <td class="col-code">${escapeHtml(u.code)}</td>
                        <td class="col-extras">${extrasHtml(u)}</td>
                        <td><span class="status-pill status-${escapeHtml(u.status)}">${escapeHtml(u.status)}</span></td>
                        <td class="col-mapro"><a href="${maproUrl}" target="_blank" rel="noopener" class="btn-mapro" title="Open in MAPRO">MAPRO ↗</a></td>
                    </tr>
                    ${expanded ? `<tr class="unit-row-details"><td colspan="5">${detailsHtml(u)}</td></tr>` : ""}
                `;
            }).join("");

            tbody.querySelectorAll(".unit-row").forEach((tr) => {
                tr.addEventListener("click", (e) => {
                    if (e.target.closest("a, .copyable")) return;
                    toggleExpand(tr.dataset.key);
                });
            });
            tbody.querySelectorAll(".copyable").forEach((el) => {
                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    copyText(el.dataset.copy);
                });
            });
        }

        window.applyFilter = applyFilter;
        window.refreshUnits = () => loadUnits(true);

        document.addEventListener("keydown", function (e) {
            const active = document.activeElement;
            const tag = active ? active.tagName : "";
            if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.key.length === 1) {
                document.getElementById("search").focus();
            }
        });
    </script>
</head>

<body>
    <header id="app-header" class="app-header"></header>

    <div id="toast" class="units-toast"></div>

    <main class="units-main">
        <div class="units-toolbar">
            <input type="text" id="search" placeholder="Search by code, title, address, resort, owner…" oninput="window.applyFilter()" class="units-search">
            <span id="count" class="units-count"></span>
            <button onclick="window.refreshUnits()" class="btn btn-sm btn-outline">Refresh</button>
        </div>

        <div id="status" class="units-status"></div>

        <div class="units-table-wrap">
            <table class="units-table">
                <thead>
                    <tr>
                        <th class="col-thumb"></th>
                        <th>Code</th>
                        <th>Extras</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="units-tbody"></tbody>
            </table>
        </div>
    </main>
</body>

</html>
