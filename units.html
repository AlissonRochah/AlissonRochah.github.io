<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="style/theme.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/units.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKYoUaxhOX1pagezUTTDbwWVg5ktcSEcY",
            authDomain: "templatemaster-a2d6e.firebaseapp.com",
            projectId: "templatemaster-a2d6e",
            storageBucket: "templatemaster-a2d6e.firebasestorage.app",
            messagingSenderId: "208432538664",
            appId: "1:208432538664:web:10a29a55efbb824ae1411d",
            measurementId: "G-LLVT6XW024"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        const DEFAULT_PROXY_URL = "https://alisson-rochah-github-io.vercel.app";
        const CACHE_KEY = "masterbotUnitsCache";
        const CACHE_SCHEMA = 2;
        const CACHE_TTL_MS = 24 * 60 * 60 * 1000;
        const JOBBER_EXTENSION_ID = "dmaenamjjgeclplnofeoiipddinihhhl";
        const JOBBER_MAPPING_KEY = "masterbotJobberMapping";
        let proxyUrl = localStorage.getItem("masterbotProxyUrl") || DEFAULT_PROXY_URL;
        let currentUser = null;
        let allUnits = [];
        let filteredUnits = [];
        let expandedKey = null;

        function readCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const obj = JSON.parse(raw);
                if (!obj || !obj.ts || !Array.isArray(obj.units)) return null;
                if (obj.schema !== CACHE_SCHEMA) return null;
                if (Date.now() - obj.ts > CACHE_TTL_MS) return null;
                return obj;
            } catch (_) { return null; }
        }

        function writeCache() {
            try {
                const stripped = allUnits.map((u) => {
                    const { _stays, _staysFetching, ...rest } = u;
                    return rest;
                });
                localStorage.setItem(CACHE_KEY, JSON.stringify({ schema: CACHE_SCHEMA, ts: Date.now(), units: stripped }));
            } catch (_) { /* quota or serialization errors — ignore */ }
        }

        const initialCache = readCache();
        if (initialCache) {
            allUnits = initialCache.units;
            filteredUnits = allUnits;
            document.getElementById("count").innerText = `${allUnits.length} units`;
            render();
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            currentUser = user;
            document.getElementById("user-email").innerText = user.email;

            if (initialCache) return;

            try {
                const globalRef = doc(db, "settings", "global");
                const snap = await getDoc(globalRef);
                if (snap.exists() && snap.data().proxyUrl) {
                    proxyUrl = snap.data().proxyUrl;
                }
            } catch (_) { /* ignore */ }

            await loadUnits();
        });

        async function loadUnits(forceFresh) {
            const status = document.getElementById("status");

            if (!forceFresh) {
                const cached = readCache();
                if (cached) {
                    allUnits = cached.units;
                    filteredUnits = allUnits;
                    document.getElementById("count").innerText = `${allUnits.length} units`;
                    status.innerText = "";
                    status.className = "units-status";
                    render();
                    return;
                }
            }

            status.innerText = "Loading units…";
            status.className = "units-status loading";

            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/units", {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.status === 503) {
                    const body = await res.json().catch(() => ({}));
                    if (body.error === "MAPRO_NOT_LOGGED_IN") {
                        status.innerText = "MAPRO session expired. An admin needs to refresh the cookie in the proxy.";
                        status.className = "units-status error";
                        return;
                    }
                }
                if (!res.ok) {
                    status.innerText = `Error ${res.status} loading units.`;
                    status.className = "units-status error";
                    return;
                }
                const data = await res.json();
                allUnits = Array.isArray(data.units) ? data.units : [];
                filteredUnits = allUnits;
                writeCache();
                document.getElementById("count").innerText = `${allUnits.length} units`;
                status.innerText = "";
                status.className = "units-status";
                render();
            } catch (e) {
                status.innerText = "Network error: " + e.message;
                status.className = "units-status error";
            }
        }

        function escapeHtml(s) {
            if (s === null || s === undefined) return "";
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        function imageThumb(htmlStr) {
            if (!htmlStr) return "";
            const m = String(htmlStr).match(/src=['"]([^'"]+)['"]/);
            return m ? `<img src="${escapeHtml(m[1])}" alt="" class="unit-thumb">` : "";
        }

        function applyFilter() {
            const q = document.getElementById("search").value.trim().toLowerCase();
            if (!q) { filteredUnits = allUnits; }
            else {
                filteredUnits = allUnits.filter((u) => {
                    return (u.code || "").toLowerCase().includes(q)
                        || (u.title || "").toLowerCase().includes(q)
                        || (u.address || "").toLowerCase().includes(q)
                        || (u.resort || "").toLowerCase().includes(q)
                        || (u.homeowner || "").toLowerCase().includes(q);
                });
            }
            render();
        }

        function isAddressFull(addr) {
            if (!addr) return false;
            return /,/.test(addr) && /\b(FL|Florida)\b/i.test(addr);
        }

        async function fetchFullAddress(u) {
            if (u._fullAddress || u._addressFetching) return;
            u._addressFetching = true;
            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/unit-address?id=" + encodeURIComponent(u.idMAPRO), {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.ok) {
                    const data = await res.json();
                    u._fullAddress = data.address || u.address;
                    writeCache();
                    if (expandedKey === u.key) render();
                }
            } catch (_) { /* fall back to bulk address */ }
            finally { u._addressFetching = false; }
        }

        async function fetchStays(u) {
            if (u._stays || u._staysFetching || !u.ulid) return;
            u._staysFetching = true;
            try {
                const idToken = await currentUser.getIdToken();
                const res = await fetch(proxyUrl + "/api/mapro/unit-stays?key=" + encodeURIComponent(u.ulid), {
                    headers: { "Authorization": "Bearer " + idToken },
                });
                if (res.ok) {
                    u._stays = await res.json();
                    if (expandedKey === u.key) render();
                }
            } catch (_) { /* ignore */ }
            finally { u._staysFetching = false; }
        }

        function jobberMessage(action, payload) {
            return new Promise((resolve) => {
                if (typeof chrome === "undefined" || !chrome.runtime || !chrome.runtime.sendMessage) {
                    resolve({ ok: false, error: "no_extension_api" });
                    return;
                }
                try {
                    chrome.runtime.sendMessage(JOBBER_EXTENSION_ID, { action, payload }, (response) => {
                        if (chrome.runtime.lastError) {
                            resolve({ ok: false, error: "extension_unreachable" });
                            return;
                        }
                        resolve(response || { ok: false, error: "no_response" });
                    });
                } catch (e) {
                    resolve({ ok: false, error: String(e && e.message || e) });
                }
            });
        }

        async function jobberQuery(operationName, query, variables) {
            const res = await jobberMessage("jobber-query", { operationName, query, variables: variables || {} });
            if (!res || !res.ok) {
                const err = new Error(res && res.error || "jobber_unknown_error");
                err.code = res && res.error;
                throw err;
            }
            return res.data;
        }

        function readJobberMapping() {
            try { return JSON.parse(localStorage.getItem(JOBBER_MAPPING_KEY) || "{}"); }
            catch (_) { return {}; }
        }

        function writeJobberMapping(map) {
            try { localStorage.setItem(JOBBER_MAPPING_KEY, JSON.stringify(map)); }
            catch (_) { /* quota — ignore */ }
        }

        async function fetchJobberMatch(u) {
            if (u._jobber || u._jobberFetching) return;
            u._jobberFetching = true;
            try {
                const map = readJobberMapping();
                const cached = map[u.key];
                if (cached) {
                    u._jobber = { match: cached };
                    if (expandedKey === u.key) render();
                    return;
                }
                const ping = await jobberMessage("ping");
                if (!ping || !ping.ok) {
                    u._jobber = { error: ping && ping.error || "extension_unreachable" };
                    if (expandedKey === u.key) render();
                    return;
                }
                const street = (u._fullAddress || u.address || "").split(",")[0].trim();
                if (!street) {
                    u._jobber = { error: "no_address" };
                    if (expandedKey === u.key) render();
                    return;
                }
                const streetNumber = (street.match(/^\S+/) || [""])[0];
                const searchQuery = `query GlobalSearch($searchTerm: String!, $before: String, $after: String, $first: Int, $last: Int) {
                    search(searchTerm: $searchTerm, first: $first, last: $last, before: $before, after: $after) {
                        nodes {
                            __typename
                            ... on Property {
                                id
                                propertyName: name
                                street
                                propertySc: client { id name __typename }
                                __typename
                            }
                        }
                    }
                }`;
                async function runSearch(term) {
                    return jobberQuery("GlobalSearch", searchQuery, { searchTerm: term, first: 10 })
                        .catch((e) => ({ _error: e.message || String(e) }));
                }
                const tried = [];
                const codeFull = (u.code || "").trim();
                const codePrefix = (codeFull.match(/^\S+/) || [""])[0];
                const attempts = [];
                if (street) attempts.push(street);
                if (streetNumber && streetNumber !== street) attempts.push(streetNumber);
                if (codePrefix) attempts.push(codePrefix);
                if (codeFull && codeFull !== codePrefix) attempts.push(codeFull);
                let data, propertyNodes = [];
                for (const term of attempts) {
                    if (tried.includes(term)) continue;
                    data = await runSearch(term);
                    tried.push(term);
                    if (data && data._error) break;
                    const nodes = (data && data.search && data.search.nodes) || [];
                    propertyNodes = nodes.filter((n) => n && n.__typename === "Property");
                    if (propertyNodes.length > 0) break;
                }
                if (data && data._error) {
                    u._jobber = { error: data._error };
                } else {
                    const candidates = propertyNodes
                        .map((n) => ({
                            id: n.id,
                            propertyName: n.propertyName,
                            street: n.street,
                            client: n.propertySc || null,
                        }));
                    if (candidates.length === 1) {
                        const c = candidates[0];
                        const label = c.street || c.propertyName || (c.client && c.client.name) || c.id;
                        const map = readJobberMapping();
                        map[u.key] = {
                            propertyId: c.id,
                            clientId: c.client && c.client.id || "",
                            propertyName: c.propertyName || "",
                            clientName: c.client && c.client.name || "",
                            label,
                            ts: Date.now(),
                        };
                        writeJobberMapping(map);
                        u._jobber = { match: map[u.key] };
                    } else {
                        u._jobber = { candidates, tried };
                    }
                }
                if (expandedKey === u.key) render();
            } catch (e) {
                u._jobber = { error: String(e && e.message || e) };
                if (expandedKey === u.key) render();
            } finally {
                u._jobberFetching = false;
            }
        }

        window.manualJobberSearch = async function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            const input = document.getElementById(`manual-search-${key}`);
            const term = input && input.value.trim();
            if (!term) { showToast("Type something to search"); return; }
            const tried = (u._jobber && u._jobber.tried) || [];
            u._jobber = { candidates: u._jobber && u._jobber.candidates || [], tried, searching: true };
            render();
            try {
                const data = await jobberQuery(
                    "GlobalSearch",
                    `query GlobalSearch($searchTerm: String!, $first: Int) {
                        search(searchTerm: $searchTerm, first: $first) {
                            nodes {
                                __typename
                                ... on Property {
                                    id
                                    propertyName: name
                                    street
                                    propertySc: client { id name __typename }
                                    __typename
                                }
                            }
                        }
                    }`,
                    { searchTerm: term, first: 20 }
                );
                const nodes = (data && data.search && data.search.nodes) || [];
                const candidates = nodes
                    .filter((n) => n && n.__typename === "Property")
                    .map((n) => ({
                        id: n.id,
                        propertyName: n.propertyName,
                        street: n.street,
                        client: n.propertySc || null,
                    }));
                u._jobber = { candidates, tried: [...tried, term] };
            } catch (e) {
                u._jobber = { error: String(e && e.message || e) };
            }
            render();
        };

        window.confirmJobberMatch = function (key, idx) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._jobber || !Array.isArray(u._jobber.candidates)) return;
            const c = u._jobber.candidates[Number(idx)];
            if (!c) return;
            const label = c.street || c.propertyName || (c.client && c.client.name) || c.id;
            const map = readJobberMapping();
            map[key] = {
                propertyId: c.id,
                clientId: c.client && c.client.id || "",
                propertyName: c.propertyName || "",
                clientName: c.client && c.client.name || "",
                label,
                ts: Date.now(),
            };
            writeJobberMapping(map);
            u._jobber = { match: map[key] };
            if (expandedKey === key) render();
        };

        window.clearJobberMatch = function (key) {
            const map = readJobberMapping();
            delete map[key];
            writeJobberMapping(map);
            const u = filteredUnits.find((x) => x.key === key);
            if (u) {
                u._jobber = null;
                if (expandedKey === key) {
                    fetchJobberMatch(u);
                }
            }
        };

        function toggleExpand(key) {
            expandedKey = (expandedKey === key) ? null : key;
            render();
            if (expandedKey) {
                const u = filteredUnits.find((x) => x.key === key);
                if (u && !isAddressFull(u.address)) fetchFullAddress(u);
                if (u) fetchStays(u);
                if (u) fetchJobberMatch(u);
            }
        }

        function detailsHtml(u) {
            const rows = [
                ["Address", u._fullAddress || u.address],
                ["Gate code", u.gatePassword],
                ["Responsible", u.responsible],
                ["Cleaner", u.cleaner],
                ["Sleeps", u.MaxOccupancy],
                ["Resort", u.resort],
                ["Resort address", u.resortAddress],
                ["Bedrooms", u.BedroomCount],
                ["Bathrooms", u.BathroomCount],
                ["Living area (sqft)", u.total_living_area_sqft],
                ["Layout", u.Layoutbeds],
                ["Type", u.Type],
            ].filter(([_, v]) => v !== null && v !== undefined && v !== "");

            const detailsRows = rows.map(([k, v]) => `
                <div class="unit-detail-row">
                    <span class="unit-detail-key">${escapeHtml(k)}</span>
                    <span class="unit-detail-val copyable" data-copy="${escapeHtml(v)}">${escapeHtml(v)}</span>
                </div>
            `).join("");

            return `<div class="unit-details">${detailsRows}</div>${staysHtml(u)}${jobberExtrasHtml(u)}`;
        }

        function fmtDate(s) {
            if (!s) return "";
            const d = new Date(String(s).replace(" ", "T"));
            if (isNaN(d)) return s;
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
        }

        function stayCard(label, r, kind) {
            if (!r) {
                return `<div class="stay-card stay-empty stay-${kind}">
                    <div class="stay-label">${label}</div>
                    <div class="stay-empty-text">No guest</div>
                </div>`;
            }
            const dates = `${fmtDate(r.ci)} - ${fmtDate(r.co)}`;
            const ch = String(r.channel || "");
            const isAirbnb = /airbnb/i.test(ch);
            const isVrbo = /vrbo/i.test(ch);
            const channelClass = /red\s*airbnb/i.test(ch) ? "stay-pill stay-pill-red"
                : /green\s*airbnb/i.test(ch) ? "stay-pill stay-pill-green"
                : isVrbo ? "stay-pill stay-pill-vrbo"
                : "stay-pill";
            const channel = ch ? `<span class="${channelClass}">${escapeHtml(ch)}</span>` : "";
            const conf = r.confirmation ? `<span class="copyable stay-conf" data-copy="${escapeHtml(r.confirmation)}">${escapeHtml(r.confirmation)}</span>` : "";
            const door = r.doorCode ? `<span class="copyable stay-door" data-copy="${escapeHtml(r.doorCode)}">Door ${escapeHtml(r.doorCode)}</span>` : "";
            const maproLink = r.link ? `<a class="btn-mapro" href="https://app.mapro.us${escapeHtml(r.link)}" target="_blank" rel="noopener">MAPRO ↗</a>` : "";
            const airbnbVariant = /red\s*airbnb/i.test(ch) ? " btn-airbnb-red"
                : /green\s*airbnb/i.test(ch) ? " btn-airbnb-green"
                : "";
            const platformLink = isAirbnb && r.confirmation
                ? `<a class="btn-airbnb${airbnbVariant}" href="https://www.airbnb.com/hosting/reservations/details/${encodeURIComponent(r.confirmation)}" target="_blank" rel="noopener">Airbnb ↗</a>`
                : isVrbo && r.guest
                ? `<a class="btn-vrbo" href="https://www.vrbo.com/supply/inbox?search=${encodeURIComponent(r.guest)}" target="_blank" rel="noopener">VRBO ↗</a>`
                : "";
            const actions = [platformLink, maproLink].filter(Boolean).join("");
            return `<div class="stay-card stay-${kind}">
                <div class="stay-label">${label}</div>
                <div class="stay-guest">${escapeHtml(r.guest || "Unknown")}</div>
                <div class="stay-dates">${dates}</div>
                <div class="stay-meta">${channel}${conf}${door}</div>
                ${actions ? `<div class="stay-actions">${actions}</div>` : ""}
            </div>`;
        }

        function staysHtml(u) {
            if (!u.ulid) return "";
            if (!u._stays) {
                return `<div class="unit-stays-loading">Loading stays…</div>`;
            }
            const right = u._stays.active
                ? stayCard("Current guest", u._stays.active, "now")
                : stayCard("Next guest", u._stays.next, "next");
            return `<div class="unit-stays">
                ${stayCard("Previous guest", u._stays.previous, "prev")}
                ${right}
            </div>`;
        }

        function todayIso() {
            const d = new Date();
            return d.toISOString().slice(0, 10);
        }

        function jobberExtrasHtml(u) {
            const j = u._jobber;
            if (!j) {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Loading…</div></div>`;
            }
            if (j.error === "extension_unreachable" || j.error === "no_extension_api") {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Install the MasterBot Bridge extension to enable Jobber.</div></div>`;
            }
            if (j.error === "no_address") {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Load the full address first.</div></div>`;
            }
            if (j.error) {
                return `<div class="unit-extras"><div class="extras-label">Extras</div><div class="extras-empty">Error: ${escapeHtml(j.error)}</div></div>`;
            }
            if (!j.match) {
                const candidates = j.candidates || [];
                const tried = (j.tried || []).map((t) => `"${escapeHtml(t)}"`).join(", ");
                const manualInput = `<div class="extras-manual-search">
                    <input type="text" id="manual-search-${escapeHtml(u.key)}" placeholder="Search Jobber by name/address" ${j.searching ? "disabled" : ""}>
                    <button type="button" class="btn-extra" ${j.searching ? "disabled" : ""} onclick="manualJobberSearch('${escapeHtml(u.key)}')">${j.searching ? "Searching…" : "Search"}</button>
                </div>`;
                if (candidates.length === 0) {
                    return `<div class="unit-extras">
                        <div class="extras-label">Extras</div>
                        <div class="extras-empty">No Jobber property found.${tried ? ` Tried: ${tried}` : ""}</div>
                        ${manualInput}
                    </div>`;
                }
                const items = candidates.map((c, idx) => {
                    const street = c.street || c.propertyName || "";
                    const clientName = c.client && c.client.name || "";
                    return `<button class="extras-candidate" type="button" onclick="confirmJobberMatch('${escapeHtml(u.key)}', ${idx})">
                        <div class="cand-addr">${escapeHtml(street)}</div>
                        ${clientName ? `<div class="cand-client">${escapeHtml(clientName)}</div>` : ""}
                    </button>`;
                }).join("");
                return `<div class="unit-extras">
                    <div class="extras-label">Pick the matching Jobber property${tried ? ` <span class="extras-tried">(searched ${tried})</span>` : ""}</div>
                    <div class="extras-candidates">${items}</div>
                    ${manualInput}
                </div>`;
            }

            const matchLabel = escapeHtml(j.match.label || j.match.propertyId);
            const draft = u._extraDraft;
            const created = u._extraJobs || [];

            const createdHtml = created.length === 0 ? "" : `<div class="extras-created">${
                created.map((cj) => {
                    const numericId = decodeJobberId(cj.id);
                    const url = numericId ? `https://secure.getjobber.com/jobs/${encodeURIComponent(numericId)}` : "";
                    const display = cj.jobNumber || numericId;
                    const meta = [];
                    if (cj.assigneeName) meta.push(`<span class="created-meta"><span class="created-meta-label">Assigned:</span> ${escapeHtml(cj.assigneeName)}</span>`);
                    if (cj.member) meta.push(`<span class="created-meta"><span class="created-meta-label">Member:</span> ${escapeHtml(cj.member)}</span>`);
                    const numberHtml = display
                        ? `<span class="created-number copyable" onclick="copyText('${escapeHtml(String(display))}')" title="Click to copy">#${escapeHtml(String(display))}</span>`
                        : "";
                    const openBtn = url
                        ? `<a class="created-open" href="${url}" target="_blank" rel="noopener" title="Open in Jobber">↗</a>`
                        : "";
                    return `<div class="extras-created-row">
                        <span class="created-tag created-tag-${cj.status}">${cj.status === "ok" ? "✓" : "✗"}</span>
                        <span class="created-title">${escapeHtml(cj.title)}</span>
                        ${cj.status === "ok"
                            ? `${numberHtml}${openBtn}${meta.length ? `<span class="created-meta-group">${meta.join("")}</span>` : ""}`
                            : `<span class="created-error">${escapeHtml(cj.error || "")}</span>`
                        }
                    </div>`;
                }).join("")
            }</div>`;

            let formHtml = "";
            if (!draft) {
                formHtml = `<div class="extras-actions">
                    <button class="btn-extra" type="button" onclick="startExtra('${escapeHtml(u.key)}','PH')">+ PH on/off</button>

            return `<div class="unit-extras">

        const CREATE_JOB_MUTATION = `mutation CreateJob($input: JobCreateAttributes!) {
            jobCreate(input: $input) {
                job {
                    id
                    jobNumber
                    title
                    visits(first: 1) { nodes { id } }
                }
                userErrors { message path }
            }
        }`;

        const JOBBER_BBQ_TEAM_IDS = { West: "MTcyMjQwMg==", East: "NjUwNTcz" };
        const JOBBER_TEAM_IDS = {
            "PH WEST": "MTI2MzkxNQ==",
            "PH EAST": "OTIxNzQ2",
            "AFTER GUEST REPORT - WEST": "MTcxMDM0NA==",
            "AFTER GUEST REPORT - EAST": "NjUwNTc0",
            "WEST 1": "NjUwNTY2",
            "WEST 2": "NjUwNTY3",
            "WEST 3": "NjUwNTY4",
            "WEST 4": "MTc3NzcwMA==",
            "WEST 5": "MTg3ODY0MA==",
            "WEST 6": "MTg5NjM3OA==",
            "WEST 7": "MTk4OTY1OA==",
            "WEST 8": "MjExNDc0Mg==",
            "EAST 1": "NjUwNTY0",
            "EAST 2": "NjUwNTY1",
            "EAST 3": "MTg3ODc5Nw==",
            "EAST 4": "MjEwNDU1NA==",
            "EAST 5": "MjcxNjkzNA==",
        };
        const JOBBER_TEAM_NAMES = Object.fromEntries(Object.entries(JOBBER_TEAM_IDS).map(([name, id]) => [id, name]));

        function computePHOnAssignees(area, areaNumber, dateIso) {
            const upper = area.toUpperCase();
            const phId = JOBBER_TEAM_IDS[`PH ${upper}`];
            const sameDay = isSameDayIso(dateIso);
            if (!sameDay) {
                return phId ? [phId] : [];
            }
            if (isBefore330LocalTime()) {
                const areaId = areaNumber ? JOBBER_TEAM_IDS[`${upper} ${areaNumber}`] : null;
                return [phId, areaId].filter(Boolean);
            }
            const afterId = JOBBER_TEAM_IDS[`AFTER GUEST REPORT - ${upper}`];
            return afterId ? [afterId] : [];
        }

        function computePHOffAssignees(area) {
            const phId = JOBBER_TEAM_IDS[`PH ${area.toUpperCase()}`];
            return phId ? [phId] : [];
        }

        function computeDeliverPickupAssignees(area, areaNumber, dateIso) {
            const upper = area.toUpperCase();
            if (isSameDayIso(dateIso) && !isBefore330LocalTime()) {
                const afterId = JOBBER_TEAM_IDS[`AFTER GUEST REPORT - ${upper}`];
                return afterId ? [afterId] : [];
            }
            const areaId = areaNumber ? JOBBER_TEAM_IDS[`${upper} ${areaNumber}`] : null;
            return areaId ? [areaId] : [];
        }

        const DEFAULT_EXTRA_ITEMS = [
            { key: "pack_and_play", label: "Pack and play" },
            { key: "high_chair", label: "High chair" },
        ];

        function buildExtrasTitle(action, items, customItems) {
            const parts = [];
            const fmt = (count, name) => `${count} ${count === 1 ? "extra" : "extras"} ${String(name || "").toLowerCase()}`;
            for (const i of items) {
                if (i.count > 0) parts.push(fmt(i.count, i.label));
            }
            for (const c of (customItems || [])) {
                const name = (c.label || "").trim();
                const count = Number(c.count) || 0;
                if (name && count > 0) parts.push(fmt(count, name));
            }
            return parts.length ? `${action} ${parts.join(" + ")}` : action;
        }

        function labelsFromTeamIds(ids) {
            return (ids || []).map((id) => JOBBER_TEAM_NAMES[id] || id);
        }

        const PH_JOB_TITLES = new Set(["PH ON", "PH OFF"]);

        async function fetchPropertyPHJobs(clientId, propertyId) {
            if (!clientId || !propertyId) return [];
            try {
                const data = await jobberQuery(
                    "MasterBotPropertyJobs",
                    `query MasterBotPropertyJobs($clientId: EncodedId!, $propertyIds: [EncodedId!], $first: Int) {
                        client(id: $clientId) {
                            id
                            requestedWorkObjects(
                                first: $first
                                filter: { types: [JOB], propertyIds: $propertyIds, status: ALL }
                            ) {
                                edges {
                                    node {
                                        __typename
                                        ... on Job {
                                            id
                                            jobNumber
                                            jobStatus
                                            startAt
                                            title
                                        }
                                    }
                                }
                            }
                        }
                    }`,
                    { clientId, propertyIds: [propertyId], first: 50 }
                );
                const edges = (data && data.client && data.client.requestedWorkObjects && data.client.requestedWorkObjects.edges) || [];
                return edges
                    .map((e) => e.node)
                    .filter((n) => n && n.__typename === "Job" && PH_JOB_TITLES.has(n.title))
                    .map((n) => ({
                        id: n.id,
                        jobNumber: n.jobNumber,
                        title: n.title,
                        jobStatus: n.jobStatus,
                        startAt: n.startAt,
                        startDate: (n.startAt || "").slice(0, 10),
                    }));
            } catch (_) {
                return [];
            }
        }

        function findPHConflicts(existing, onDate, offDate) {
            if (!onDate || !offDate || !existing || !existing.length) return [];
            const lo = onDate < offDate ? onDate : offDate;
            const hi = onDate < offDate ? offDate : onDate;
            return existing.filter((j) => j.startDate >= lo && j.startDate <= hi && j.jobStatus !== "archived");
        }

        function decodeJobberId(encoded) {
            try { return atob(String(encoded || "")).replace(/^\D+/, ""); }
            catch (_) { return ""; }
        }

        function detectAreaSuffix(u, match) {
            const info = detectAreaInfo(u, match);
            return info && info.area;
        }

        function detectAreaInfo(u, match) {
            const sources = [
                match && match.clientName,
                match && match.propertyName,
                match && match.label,
                u && u.code,
                u && u.title,
                u && (u._fullAddress || u.address),
                u && u.resort,
                u && u.homeowner,
            ];
            for (const s of sources) {
                const m = String(s || "").match(/\b([WE])(\d+)\b/);
                if (m) {
                    return {
                        area: m[1].toUpperCase() === "W" ? "West" : "East",
                        number: m[2],
                    };
                }
            }
            return null;
        }

        function isSameDayIso(iso) {
            return iso === todayIso();
        }

        function isBefore330LocalTime() {
            const now = new Date();
            const minutes = now.getHours() * 60 + now.getMinutes();
            return minutes < (15 * 60 + 30);
        }

        function fmtMonthDay(iso) {
            if (!iso) return "";
            const parts = iso.split("-");
            if (parts.length !== 3) return iso;
            return `${Number(parts[1])}/${Number(parts[2])}`;
        }

        let _jobberMember = null;
        let _memberOptions = null;
        const JOBBER_MEMBER_CACHE_KEY = "masterbotJobberMember";
        const JOBBER_MEMBER_VERSION_KEY = "masterbotJobberMemberV";
        const JOBBER_MEMBER_VERSION = "v3";
        if (localStorage.getItem(JOBBER_MEMBER_VERSION_KEY) !== JOBBER_MEMBER_VERSION) {
            localStorage.removeItem(JOBBER_MEMBER_CACHE_KEY);
            localStorage.setItem(JOBBER_MEMBER_VERSION_KEY, JOBBER_MEMBER_VERSION);
        }

        async function fetchMemberOptions(propertyId, clientId) {
            if (_memberOptions) return _memberOptions;
            try {
                const data = await jobberQuery(
                    "JobDefaultCustomFieldValues",
                    `query JobDefaultCustomFieldValues($clientId: EncodedId, $propertyId: EncodedId) {
                        jobDefaultCustomFieldValues(clientId: $clientId, propertyId: $propertyId) {
                            nodes {
                                __typename
                                ... on CustomFieldDropdown {
                                    label
                                    dropdownOptions
                                    customFieldConfiguration { id __typename }
                                }
                            }
                        }
                    }`,
                    { clientId: clientId || null, propertyId: propertyId || null }
                );
                const nodes = (data && data.jobDefaultCustomFieldValues && data.jobDefaultCustomFieldValues.nodes) || [];
                const member = nodes.find((n) => n && n.__typename === "CustomFieldDropdown" && n.label === "Member");
                _memberOptions = (member && member.dropdownOptions) || [];
            } catch (_) {
                _memberOptions = [];
            }
            return _memberOptions;
        }

        function matchMemberOption(candidate, options) {
            if (!candidate || !Array.isArray(options) || !options.length) return null;
            const norm = (s) => String(s || "").trim().toLowerCase();
            const c = norm(candidate);
            if (!c) return null;
            const exact = options.find((o) => norm(o) === c);
            if (exact) return exact;
            const startsWith = options.find((o) => norm(o).startsWith(c) || c.startsWith(norm(o)));
            if (startsWith) return startsWith;
            const tokens = c.split(/\s+/).filter(Boolean);
            const containsAll = options.find((o) => {
                const on = norm(o);
                return tokens.every((t) => on.includes(t));
            });
            return containsAll || null;
        }

        async function fetchJobberMember() {
            if (_jobberMember) return _jobberMember;
            const cached = localStorage.getItem(JOBBER_MEMBER_CACHE_KEY);
            if (cached) {
                _jobberMember = cached;
                return cached;
            }
            try {
                const data = await jobberQuery(
                    "JobberCurrentAccount",
                    `query JobberCurrentAccount {
                        account {
                            currentUser {
                                id
                                name { first full last }
                            }
                        }
                    }`,
                    {}
                );
                const user = data && data.account && data.account.currentUser;
                const nm = user && user.name;
                const name = (nm && (nm.full || [nm.first, nm.last].filter(Boolean).join(" "))) || "";
                if (name) {
                    _jobberMember = name;
                    localStorage.setItem(JOBBER_MEMBER_CACHE_KEY, name);
                    return name;
                }
            } catch (_) {}
            return null;
        }

        async function createJobberJob({ propertyId, title, startAt, assigneeName, assignedTo, clientId }) {
            const memberFromJobber = await fetchJobberMember();
            const yourName = (localStorage.getItem("yourName") || "").trim();
            const options = await fetchMemberOptions(propertyId, clientId);
            const candidates = [memberFromJobber, yourName].filter(Boolean);
            let memberName = "";
            for (const c of candidates) {
                const match = matchMemberOption(c, options);
                if (match) { memberName = match; break; }
            }
            if (!memberName && candidates.length && (!options || !options.length)) {
                memberName = candidates[0];
            }
            const customFields = memberName ? [{
                valueDropdown: memberName,
                customFieldConfigurationId: "MzY0NTQ2",
            }] : [];
            const who = (assigneeName || title || "").trim();
            const noteMessage = `${fmtMonthDay(startAt)} | ${who}`.trim();
            const notes = noteMessage ? [{
                attachments: [],
                linkedTo: { invoices: true },
                message: noteMessage,
            }] : [];

            const input = {
                customFields,
                instructions: "",
                invoicing: { invoicingSchedule: "NEVER", invoicingType: "FIXED_PRICE" },
                jobFormIds: [],
                jobType: "ONE_OFF",
                lineItems: [],
                notes,
                progressInvoicingSchedule: null,
                propertyId,
                salespersonId: null,
                scheduling: { assignedTo: Array.isArray(assignedTo) ? assignedTo : [], createVisits: true, notifyTeam: false },
                timeframe: { durationUnits: "DAYS", durationValue: 0, startAt },
                title,
                trackingOrigin: "property",
            };
            const data = await jobberQuery("CreateJob", CREATE_JOB_MUTATION, { input });
            const errs = data?.jobCreate?.userErrors || [];
            if (errs.length) throw new Error(errs.map((e) => e.message).join("; "));
            return data?.jobCreate?.job;
        }

        window.startExtra = function (key, type) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._jobber || !u._jobber.match) return;
            u._extraDraft = { type };
            if (type === "PH") {
                u._extraDraft.existingPHJobs = null;
                u._extraDraft.loadingExisting = true;
                fetchPropertyPHJobs(u._jobber.match.clientId, u._jobber.match.propertyId).then((jobs) => {
                    if (u._extraDraft && u._extraDraft.type === "PH") {
                        u._extraDraft.existingPHJobs = jobs;
                        u._extraDraft.loadingExisting = false;
                        render();
                    }
                });
            }
            render();
        };

        window.cancelExtra = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u) return;
            u._extraDraft = null;
            render();
        };

        function readDateInput(id) {
            const el = document.getElementById(id);
            return el ? el.value : "";
        }

        async function runCreateAndRecord(u, jobs) {
            u._extraDraft.submitting = true;
            render();
            u._extraJobs = u._extraJobs || [];
            const propertyId = u._jobber.match.propertyId;
            const clientId = u._jobber.match.clientId;
            const memberFromJobber = await fetchJobberMember();
            const yourName = (localStorage.getItem("yourName") || "").trim();
            const options = await fetchMemberOptions(propertyId, clientId);
            let resolvedMember = "";
            for (const c of [memberFromJobber, yourName].filter(Boolean)) {
                const m = matchMemberOption(c, options);
                if (m) { resolvedMember = m; break; }
            }
            if (!resolvedMember) resolvedMember = memberFromJobber || yourName || "";
            for (const j of jobs) {
                try {
                    const created = await createJobberJob({
                        propertyId,
                        clientId,
                        title: j.title,
                        startAt: j.startAt,
                        assigneeName: j.assigneeName,
                        assignedTo: j.assignedTo,
                    });
                    u._extraJobs.push({
                        status: "ok",
                        title: j.title,
                        id: created?.id,
                        jobNumber: created?.jobNumber,
                        assigneeName: j.assigneeName || "",
                        member: resolvedMember,
                    });
                } catch (e) {
                    u._extraJobs.push({
                        status: "err",
                        title: j.title,
                        error: e?.message || String(e),
                        assigneeName: j.assigneeName || "",
                        member: resolvedMember,
                    });
                }
            }
            u._extraDraft = null;
            render();
        }

        window.submitExtraPH = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const onDate = readDateInput(`ph-on-${key}`) || u._extraDraft.onDate;
            const offDate = readDateInput(`ph-off-${key}`) || u._extraDraft.offDate;
            if (!onDate || !offDate) { showToast("Pick both dates"); return; }
            const info = detectAreaInfo(u, u._jobber && u._jobber.match);
            const area = u._extraDraft.area || (info && info.area);
            const areaNumber = u._extraDraft.areaNumber != null ? u._extraDraft.areaNumber : (info && info.number);
            if (!area) { showToast("Pick West or East"); return; }
            const onAssignees = computePHOnAssignees(area, areaNumber, onDate);
            const offAssignees = computePHOffAssignees(area);
            const onLabel = labelsFromTeamIds(onAssignees).join(" + ") || `PH ${area}`;
            const offLabel = labelsFromTeamIds(offAssignees).join(" + ") || `PH ${area}`;
            runCreateAndRecord(u, [
                { title: "PH ON", startAt: onDate, assigneeName: onLabel, assignedTo: onAssignees },
                { title: "PH OFF", startAt: offDate, assigneeName: offLabel, assignedTo: offAssignees },
            ]);
        };

        window.setExtraArea = function (key, area) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.area = area;
            render();
        };

        window.setExtraAreaNumber = function (key, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.areaNumber = String(value || "").trim() || null;
            render();
        };

        window.setExtraDate = function (key, field, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft[field] = value;
            render();
        };

        window.setExtraItem = function (key, itemKey, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.items = u._extraDraft.items || {};
            u._extraDraft.items[itemKey] = Math.max(0, Number(value) || 0);
            render();
        };

        window.addExtraCustomItem = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft) return;
            u._extraDraft.customItems = u._extraDraft.customItems || [];
            u._extraDraft.customItems.push({ label: "", count: 1 });
            render();
        };

        window.removeExtraCustomItem = function (key, idx) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || !u._extraDraft.customItems) return;
            u._extraDraft.customItems.splice(Number(idx), 1);
            render();
        };

        window.setExtraCustomItem = function (key, idx, field, value) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || !u._extraDraft.customItems) return;
            const item = u._extraDraft.customItems[Number(idx)];
            if (!item) return;
            item[field] = field === "count" ? Math.max(0, Number(value) || 0) : value;
            render();
        };

        window.submitExtraDeliverPickup = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const draft = u._extraDraft;
            const deliverDate = draft.deliverDate || todayIso();
            const pickupDate = draft.pickupDate || todayIso();
            const info = detectAreaInfo(u, u._jobber && u._jobber.match);
            const area = draft.area || (info && info.area);
            const areaNumber = draft.areaNumber != null ? draft.areaNumber : (info && info.number);
            if (!area) { showToast("Pick West or East"); return; }
            const items = DEFAULT_EXTRA_ITEMS.map((it) => ({
                ...it,
                count: (draft.items && Number(draft.items[it.key])) || 0,
            }));
            const customItems = (draft.customItems || []).filter((c) => (c.label || "").trim() && Number(c.count) > 0);
            const total = items.reduce((a, b) => a + b.count, 0) + customItems.reduce((a, c) => a + Number(c.count), 0);
            if (total <= 0) { showToast("Pick at least 1 item"); return; }
            const deliverTitle = buildExtrasTitle("Deliver", items, customItems);
            const pickupTitle = buildExtrasTitle("Pickup", items, customItems);
            const deliverAssignees = computeDeliverPickupAssignees(area, areaNumber, deliverDate);
            const pickupAssignees = computeDeliverPickupAssignees(area, areaNumber, pickupDate);
            const deliverLabel = labelsFromTeamIds(deliverAssignees).join(" + ") || `${area} ${areaNumber || ""}`.trim();
            const pickupLabel = labelsFromTeamIds(pickupAssignees).join(" + ") || `${area} ${areaNumber || ""}`.trim();
            runCreateAndRecord(u, [
                { title: deliverTitle, startAt: deliverDate, assigneeName: deliverLabel, assignedTo: deliverAssignees },
                { title: pickupTitle, startAt: pickupDate, assigneeName: pickupLabel, assignedTo: pickupAssignees },
            ]);
        };

        window.submitExtraBBQ = function (key) {
            const u = filteredUnits.find((x) => x.key === key);
            if (!u || !u._extraDraft || u._extraDraft.submitting) return;
            const date = readDateInput(`bbq-${key}`);
            if (!date) { showToast("Pick a date"); return; }
            const area = u._extraDraft.area || detectAreaSuffix(u, u._jobber && u._jobber.match);
            if (!area) { showToast("Pick West or East"); return; }
            const assigneeName = `BBQ/PW-${area}`;
            const teamId = JOBBER_BBQ_TEAM_IDS[area];
            const assignedTo = teamId ? [teamId] : [];
            runCreateAndRecord(u, [
                { title: "BBQ Clean", startAt: date, assigneeName, assignedTo },
            ]);
        };

        async function copyText(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast(text);
            } catch (_) {
                const ta = document.createElement("textarea");
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                try { document.execCommand("copy"); showToast(text); } catch (__) {}
                document.body.removeChild(ta);
            }
        }

        function showToast(text) {
            const t = document.getElementById("toast");
            t.textContent = "Copied: " + text;
            t.classList.add("show");
            clearTimeout(t._tid);
            t._tid = setTimeout(() => t.classList.remove("show"), 1500);
        }

        function extrasHtml(u) {
            const parts = [];
            if (u.bbq) parts.push('<span class="extra-pill extra-bbq">BBQ</span>');
            if (u.poolHeater) parts.push(`<span class="extra-pill extra-ph">PH $${u.poolHeater}</span>`);
            return parts.join(" ");
        }

        function render() {
            const tbody = document.getElementById("units-tbody");
            if (filteredUnits.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="empty">No units match your search.</td></tr>`;
                return;
            }
            tbody.innerHTML = filteredUnits.map((u) => {
                const expanded = expandedKey === u.key;
                const maproUrl = `https://app.mapro.us/manage/houses/register/${encodeURIComponent(u.idMAPRO || u.key)}`;
                return `
                    <tr class="unit-row ${expanded ? "expanded" : ""}" data-key="${escapeHtml(u.key)}">
                        <td class="col-thumb">${imageThumb(u.image)}</td>
                        <td class="col-code">${escapeHtml(u.code)}</td>
                        <td class="col-extras">${extrasHtml(u)}</td>
                        <td><span class="status-pill status-${escapeHtml(u.status)}">${escapeHtml(u.status)}</span></td>
                        <td class="col-mapro"><a href="${maproUrl}" target="_blank" rel="noopener" class="btn-mapro" title="Open in MAPRO">MAPRO ↗</a></td>
                    </tr>
                    ${expanded ? `<tr class="unit-row-details"><td colspan="5">${detailsHtml(u)}</td></tr>` : ""}
                `;
            }).join("");

            tbody.querySelectorAll(".unit-row").forEach((tr) => {
                tr.addEventListener("click", (e) => {
                    if (e.target.closest("a, .copyable")) return;
                    toggleExpand(tr.dataset.key);
                });
            });
            tbody.querySelectorAll(".copyable").forEach((el) => {
                el.addEventListener("click", (e) => {
                    e.stopPropagation();
                    copyText(el.dataset.copy);
                });
            });
        }

        window.logout = function () {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        };
        window.applyFilter = applyFilter;
        window.refreshUnits = () => loadUnits(true);

        document.addEventListener("keydown", function (e) {
            const active = document.activeElement;
            const tag = active ? active.tagName : "";
            if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;
            if (e.ctrlKey || e.metaKey || e.altKey) return;
            if (e.key.length === 1) {
                document.getElementById("search").focus();
            }
        });
    </script>
</head>

<body>
    <header class="app-header">
        <div class="header-left">
            <a href="messages.html" class="header-logo">
                <img src="img/MasterLogo.jpg" alt="Logo">
            </a>
            <nav class="header-nav">
                <a href="template.html" class="nav-link">Templates</a>
                <a href="messages.html" class="nav-link">Messages</a>
                <a href="units.html" class="nav-link active">Units</a>
                <a href="ai.html" class="nav-link" id="ai-nav-link" style="display:none">AI</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="user-email" class="header-email"></span>
            <button onclick="window.logout()" class="btn btn-sm btn-outline">Sign Out</button>
        </div>
    </header>

    <div id="toast" class="units-toast"></div>

    <main class="units-main">
        <div class="units-toolbar">
            <input type="text" id="search" placeholder="Search by code, title, address, resort, owner…" oninput="window.applyFilter()" class="units-search">
            <span id="count" class="units-count"></span>
            <button onclick="window.refreshUnits()" class="btn btn-sm btn-outline">Refresh</button>
        </div>

        <div id="status" class="units-status"></div>

        <div class="units-table-wrap">
            <table class="units-table">
                <thead>
                    <tr>
                        <th class="col-thumb"></th>
                        <th>Code</th>
                        <th>Extras</th>
                        <th>Status</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="units-tbody"></tbody>
            </table>
        </div>
    </main>
</body>

</html>
