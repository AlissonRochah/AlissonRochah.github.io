<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">
    <script src="style/theme.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/ai.css">

    <script type="module">
        import { supabase } from "./js/supabase.js";
        import { requireAuth, signOut } from "./js/auth.js";
        import {
            runRouter,
            runWriter,
            runAdjust,
            buildWriterPromptPreview,
            DEFAULT_SYSTEM_PROMPT,
        } from "./js/ai.js";

        // ============ Auth + settings ============

        const session = await requireAuth();
        if (!session) throw new Error("no session");

        const currentUserId = session.user.id;
        document.getElementById("user-email").innerText = session.user.email;

        // State
        let allTemplates = [];           // full row per template
        let conversation = [];           // [{role, text, sender}]
        let resort = null;               // { id, name, gate_code, sections, ... } or null
        let routerResult = { templateIds: [], intent: "" };
        let currentDraft = "";           // last known response text
        let groqKey = "";
        let systemPrompt = DEFAULT_SYSTEM_PROMPT;
        let userSignature = { enabled: false, mode: "fixed", text: "", randomList: [] };
        let extensionId = localStorage.getItem("masterbotExtensionId") || "";
        let pipelineRunning = false;

        // Feature gate: check ai_enabled
        const { data: settingsData, error: settingsError } = await supabase
            .from("user_settings")
            .select("ai_enabled, signature_enabled, signature_mode, signature_text, random_signatures, extension_id")
            .eq("auth_user_id", currentUserId)
            .maybeSingle();

        if (settingsError || !settingsData || !settingsData.ai_enabled) {
            window.location.href = "messages.html";
            throw new Error("ai not enabled");
        }

        userSignature.enabled = settingsData.signature_enabled || false;
        userSignature.mode = settingsData.signature_mode || "fixed";
        userSignature.text = settingsData.signature_text || "";
        userSignature.randomList = settingsData.random_signatures || [];
        if (settingsData.extension_id) {
            extensionId = settingsData.extension_id;
            localStorage.setItem("masterbotExtensionId", settingsData.extension_id);
        }

        // Global AI config
        try {
            const { data: globalData } = await supabase
                .from("global_settings")
                .select("value")
                .eq("key", "ai_config")
                .maybeSingle();
            if (globalData && globalData.value) {
                systemPrompt = globalData.value.ai_system_prompt || DEFAULT_SYSTEM_PROMPT;
                groqKey = globalData.value.ai_groq_key || "";
            }
        } catch (e) {
            console.error("Error loading global AI config:", e);
        }

        // Templates
        try {
            const { data: tpls } = await supabase
                .from("templates")
                .select("id, name, description, ai_summary")
                .eq("auth_user_id", currentUserId)
                .order("sort_order", { ascending: true });
            allTemplates = (tpls || []).map((t) => ({
                id: t.id,
                name: t.name,
                description: t.description || "",
                ai_summary: t.ai_summary || "",
            }));
        } catch (e) {
            console.error("Error loading templates:", e);
        }

        // ============ Extension bridge ============

        function sendToExtension(action, payload = {}) {
            return new Promise((resolve) => {
                if (!extensionId || typeof chrome === "undefined" || !chrome.runtime || !chrome.runtime.sendMessage) {
                    resolve({ success: false, error: "Extension not available." });
                    return;
                }
                try {
                    chrome.runtime.sendMessage(extensionId, { action, ...payload }, (reply) => {
                        if (chrome.runtime.lastError) {
                            resolve({ success: false, error: chrome.runtime.lastError.message });
                            return;
                        }
                        resolve(reply || { success: false, error: "No reply from extension." });
                    });
                } catch (err) {
                    resolve({ success: false, error: err && err.message });
                }
            });
        }

        async function captureFromExtension() {
            const reply = await sendToExtension("scrapeConversation");
            if (!reply.success) return { ok: false, error: reply.error || "Capture failed." };
            return { ok: true, messages: reply.messages || [] };
        }

        async function getResortFromExtension() {
            const reply = await sendToExtension("getMatchedResort");
            if (!reply.success || !reply.resort) return null;
            return reply.resort; // { id, name, gate_code, address, listing_text, ts }
        }

        async function fetchResortFull(resortId) {
            if (!resortId) return null;
            try {
                const { data } = await supabase
                    .from("resorts")
                    .select("id, name, gate_code, sections")
                    .eq("id", resortId)
                    .maybeSingle();
                return data || null;
            } catch (e) {
                console.error("Error fetching resort:", e);
                return null;
            }
        }

        // ============ UI wiring ============

        const el = {
            resortChip: document.getElementById("chip-resort"),
            msgsChip: document.getElementById("chip-msgs"),
            tplsChip: document.getElementById("chip-tpls"),
            card: document.getElementById("response-card"),
            skeleton: document.getElementById("response-skeleton"),
            textarea: document.getElementById("response-textarea"),
            banner: document.getElementById("error-banner"),
            actionRow: document.getElementById("action-row"),
            regenerateBtn: document.getElementById("btn-regenerate"),
            adjustBtn: document.getElementById("btn-adjust"),
            copyBtn: document.getElementById("btn-copy"),
            adjustPanel: document.getElementById("adjust-panel"),
            adjustInput: document.getElementById("adjust-input"),
            adjustApply: document.getElementById("btn-adjust-apply"),
            pasteFallback: document.getElementById("paste-fallback"),
            pasteToggle: document.getElementById("paste-toggle"),
            pasteTextarea: document.getElementById("paste-textarea"),
            pasteGenerate: document.getElementById("btn-paste-generate"),
            detailsConv: document.getElementById("details-conv"),
            detailsTpls: document.getElementById("details-tpls"),
            detailsIntent: document.getElementById("details-intent"),
            detailsResort: document.getElementById("details-resort"),
            detailsPrompt: document.getElementById("details-prompt"),
            toast: document.getElementById("toast"),
        };

        function setChip(chip, text, state = "default") {
            chip.textContent = text;
            chip.classList.remove("chip-ok", "chip-warn", "chip-err", "chip-muted");
            if (state === "ok") chip.classList.add("chip-ok");
            else if (state === "warn") chip.classList.add("chip-warn");
            else if (state === "err") chip.classList.add("chip-err");
            else if (state === "muted") chip.classList.add("chip-muted");
        }

        function setStage(stage) {
            // stage ∈ "loading" | "routing" | "writing" | "ready" | "error"
            el.card.dataset.stage = stage;
            if (stage === "loading" || stage === "routing" || stage === "writing") {
                el.skeleton.style.display = "";
                el.textarea.style.display = "none";
                el.actionRow.classList.add("disabled");
            } else if (stage === "ready") {
                el.skeleton.style.display = "none";
                el.textarea.style.display = "";
                el.actionRow.classList.remove("disabled");
            }
            const labels = {
                loading: "Loading context…",
                routing: "Finding relevant templates…",
                writing: "Writing response…",
                ready: "",
                error: "",
            };
            el.skeleton.querySelector(".skeleton-label").textContent = labels[stage] || "";
        }

        function showBanner(message) {
            el.banner.textContent = message;
            el.banner.style.display = "";
        }

        function hideBanner() {
            el.banner.style.display = "none";
            el.banner.textContent = "";
        }

        function showToast(message, type = "success") {
            el.toast.textContent = message;
            el.toast.className = `toast ${type} show`;
            setTimeout(() => el.toast.classList.remove("show"), 2500);
        }

        function renderDetails() {
            // Conversation
            el.detailsConv.innerHTML = "";
            conversation.forEach((m) => {
                const row = document.createElement("div");
                row.className = "detail-msg";
                row.innerHTML = `<span class="badge badge-${m.role === "host" ? "success" : "info"}">${m.role}</span>`;
                const txt = document.createElement("div");
                txt.className = "detail-msg-text";
                txt.textContent = m.text;
                row.appendChild(txt);
                el.detailsConv.appendChild(row);
            });
            if (conversation.length === 0) {
                el.detailsConv.innerHTML = '<p class="detail-empty">No conversation captured.</p>';
            }

            // Templates used
            el.detailsTpls.innerHTML = "";
            const usedTemplates = allTemplates.filter((t) => routerResult.templateIds.includes(t.id));
            usedTemplates.forEach((t) => {
                const block = document.createElement("details");
                block.className = "detail-tpl";
                block.innerHTML = `<summary>${escapeHtml(t.name)}</summary><pre>${escapeHtml(t.description)}</pre>`;
                el.detailsTpls.appendChild(block);
            });
            if (usedTemplates.length === 0) {
                el.detailsTpls.innerHTML = '<p class="detail-empty">No templates used.</p>';
            }

            // Intent
            el.detailsIntent.textContent = routerResult.intent || "(none detected)";

            // Resort
            if (resort) {
                const sectionsHtml = (resort.sections || [])
                    .map((s) => {
                        const items = (s.items || [])
                            .filter((i) => i.label && i.value)
                            .map((i) => `<li><b>${escapeHtml(i.label)}</b>: ${escapeHtml(i.value)}</li>`)
                            .join("");
                        return items ? `<div class="detail-section"><h5>${escapeHtml(s.title || s.type)}</h5><ul>${items}</ul></div>` : "";
                    })
                    .join("");
                el.detailsResort.innerHTML =
                    `<div class="detail-resort-head"><b>${escapeHtml(resort.name)}</b>` +
                    (resort.gate_code ? ` · Gate code: <code>${escapeHtml(resort.gate_code)}</code>` : "") +
                    `</div>${sectionsHtml}`;
            } else {
                el.detailsResort.innerHTML = '<p class="detail-empty">No resort matched.</p>';
            }

            // Writer prompt preview
            const preview = buildWriterPromptPreview({
                conversation,
                resort,
                templates: usedTemplates,
                intent: routerResult.intent,
                systemPrompt,
                instruction: "",
            });
            const previewText = preview
                .map((m) => `### ${m.role.toUpperCase()}\n${m.content}`)
                .join("\n\n");
            el.detailsPrompt.textContent = previewText;
        }

        function escapeHtml(s) {
            return String(s)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        // ============ Pipeline ============

        async function runPipeline({ useConversation = null, skipRouter = false, instruction = "" } = {}) {
            if (pipelineRunning) return;
            pipelineRunning = true;
            hideBanner();

            try {
                if (!groqKey) {
                    showBanner("AI API key not configured — ask an admin.");
                    setStage("error");
                    return;
                }

                // 1. Gather context (unless passed explicitly via paste)
                setStage("loading");

                if (useConversation) {
                    conversation = useConversation;
                    setChip(el.msgsChip, `💬 ${conversation.length} messages pasted`, "ok");
                } else {
                    setChip(el.msgsChip, "💬 Capturing conversation…", "muted");
                    const capture = await captureFromExtension();
                    if (!capture.ok || capture.messages.length === 0) {
                        setChip(el.msgsChip, "💬 Could not capture", "err");
                        showBanner(capture.error || "Could not capture conversation. Use paste below.");
                        el.pasteFallback.classList.add("visible");
                        setStage("error");
                        return;
                    }
                    conversation = capture.messages;
                    setChip(el.msgsChip, `💬 ${conversation.length} messages captured`, "ok");
                }

                // 2. Resort (optional)
                if (!resort) {
                    const matched = await getResortFromExtension();
                    if (matched && matched.id) {
                        resort = await fetchResortFull(matched.id);
                    }
                }
                if (resort) {
                    setChip(el.resortChip, `🏠 ${resort.name}`, "ok");
                } else {
                    setChip(el.resortChip, "🏠 No resort matched", "muted");
                }

                // 3. Router (unless skipped for adjust flow)
                if (!skipRouter) {
                    setStage("routing");
                    setChip(el.tplsChip, "✨ Finding templates…", "muted");
                    const router = await runRouter({
                        conversation,
                        resort,
                        templates: allTemplates.map((t) => ({ id: t.id, name: t.name, ai_summary: t.ai_summary })),
                        groqKey,
                    });
                    if (!router.ok) {
                        showBanner(router.error || "Router failed.");
                        setStage("error");
                        return;
                    }
                    routerResult = { templateIds: router.templateIds, intent: router.intent };
                    if (router.degraded || router.templateIds.length === 0) {
                        setChip(el.tplsChip, "✨ 0 templates (fallback)", "warn");
                    } else {
                        setChip(el.tplsChip, `✨ ${router.templateIds.length} templates used`, "ok");
                    }
                }

                // 4. Writer
                setStage("writing");
                const usedTemplates = allTemplates.filter((t) => routerResult.templateIds.includes(t.id));
                const writer = await runWriter({
                    conversation,
                    resort,
                    templates: usedTemplates,
                    intent: routerResult.intent,
                    systemPrompt,
                    instruction,
                    groqKey,
                });
                if (!writer.ok) {
                    showBanner(writer.error || "Writer failed.");
                    setStage("error");
                    return;
                }

                currentDraft = writer.text;
                el.textarea.value = currentDraft;
                setStage("ready");
                renderDetails();

                // Auto-focus copy so Enter copies
                setTimeout(() => el.copyBtn.focus(), 100);
            } finally {
                pipelineRunning = false;
            }
        }

        // ============ Actions ============

        function getSignatureText() {
            if (!userSignature.enabled) return "";
            if (userSignature.mode === "random" && userSignature.randomList.length > 0) {
                const i = Math.floor(Math.random() * userSignature.randomList.length);
                return userSignature.randomList[i];
            }
            return userSignature.text || "";
        }

        window.doCopy = function () {
            const base = (el.textarea.value || currentDraft || "").trim();
            if (!base) {
                showToast("Nothing to copy.", "error");
                return;
            }
            const yourName = localStorage.getItem("yourName") || "";
            const sig = getSignatureText();
            let finalText = base;
            if (sig || yourName) {
                finalText += "\n\n";
                if (sig) finalText += sig + "\n";
                if (yourName) finalText += yourName;
            }
            navigator.clipboard.writeText(finalText.trim())
                .then(() => showToast("Response copied to clipboard!"))
                .catch(() => showToast("Failed to copy.", "error"));
        };

        window.doRegenerate = function () {
            routerResult = { templateIds: [], intent: "" };
            runPipeline();
        };

        window.doAdjust = function () {
            el.adjustPanel.classList.toggle("visible");
            if (el.adjustPanel.classList.contains("visible")) {
                setTimeout(() => el.adjustInput.focus(), 50);
            }
        };

        window.doApplyAdjust = async function () {
            const instruction = el.adjustInput.value.trim();
            if (!instruction) return;
            const draft = el.textarea.value || currentDraft;
            if (!draft) {
                showToast("No draft to adjust.", "error");
                return;
            }
            el.actionRow.classList.add("disabled");
            const result = await runAdjust({ draft, instruction, systemPrompt, groqKey });
            el.actionRow.classList.remove("disabled");
            if (!result.ok) {
                showToast(result.error || "Adjust failed.", "error");
                return;
            }
            currentDraft = result.text;
            el.textarea.value = currentDraft;
            el.adjustInput.value = "";
            el.adjustPanel.classList.remove("visible");
            showToast("Response adjusted!");
        };

        window.togglePasteFallback = function () {
            el.pasteFallback.classList.toggle("visible");
            if (el.pasteFallback.classList.contains("visible")) {
                setTimeout(() => el.pasteTextarea.focus(), 50);
            }
        };

        window.doPasteGenerate = function () {
            const pasted = el.pasteTextarea.value.trim();
            if (!pasted) {
                showToast("Paste a conversation first.", "error");
                return;
            }
            // Treat pasted text as a single guest message
            runPipeline({ useConversation: [{ role: "guest", text: pasted }] });
        };

        window.logout = function () {
            signOut().then(() => (window.location.href = "index.html"));
        };

        // ============ Keyboard shortcuts ============

        document.addEventListener("keydown", (e) => {
            // Skip when typing in an input/textarea (except for Enter on copy)
            const tag = (e.target && e.target.tagName) || "";
            const typing = tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT";

            if (e.key === "Escape") {
                if (el.adjustPanel.classList.contains("visible")) {
                    el.adjustPanel.classList.remove("visible");
                    return;
                }
            }

            if (typing) return;

            if (e.key === "r" || e.key === "R") {
                e.preventDefault();
                doRegenerate();
            } else if (e.key === "a" || e.key === "A") {
                e.preventDefault();
                doAdjust();
            } else if (e.key === "d" || e.key === "D") {
                e.preventDefault();
                document.getElementById("details-section").open = !document.getElementById("details-section").open;
            }
        });

        // Adjust input — Enter applies
        el.adjustInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                doApplyAdjust();
            }
        });

        // ============ Boot ============

        setChip(el.resortChip, "🏠 Loading…", "muted");
        setChip(el.msgsChip, "💬 Loading…", "muted");
        setChip(el.tplsChip, "✨ Waiting…", "muted");
        runPipeline();
    </script>
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <a href="messages.html" class="header-logo">
                <img src="img/MasterLogo.jpg" alt="Logo">
            </a>
            <nav class="header-nav">
                <a href="messages.html" class="nav-link">Messages</a>
                <a href="template.html" class="nav-link">Templates</a>
                <a href="ai.html" class="nav-link active">AI</a>
                <a href="settings.html" class="nav-link">Settings</a>
                <a href="resorts/" class="nav-link">Resorts</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="user-email" class="header-email"></span>
            <button onclick="window.logout()" class="btn btn-sm btn-outline">Sign Out</button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="ai-main">

        <!-- Status strip -->
        <div class="status-strip">
            <span id="chip-resort" class="status-chip chip-muted">🏠 Loading…</span>
            <span id="chip-msgs" class="status-chip chip-muted">💬 Loading…</span>
            <span id="chip-tpls" class="status-chip chip-muted">✨ Waiting…</span>
        </div>

        <!-- Error banner -->
        <div id="error-banner" class="error-banner" style="display:none" role="alert"></div>

        <!-- Response card -->
        <div id="response-card" class="response-card" data-stage="loading">
            <div id="response-skeleton" class="response-skeleton">
                <div class="skeleton-line"></div>
                <div class="skeleton-line short"></div>
                <div class="skeleton-line"></div>
                <p class="skeleton-label">Loading context…</p>
            </div>
            <textarea id="response-textarea" placeholder="AI response will appear here..." style="display:none"></textarea>
        </div>

        <!-- Action row -->
        <div id="action-row" class="ai-action-row disabled">
            <button id="btn-regenerate" onclick="doRegenerate()" class="btn btn-ghost btn-sm" title="Regenerate (R)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
                Regenerate
            </button>
            <button id="btn-adjust" onclick="doAdjust()" class="btn btn-outline btn-sm" title="Adjust (A)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                Adjust
            </button>
            <button id="btn-copy" onclick="doCopy()" class="btn btn-primary btn-sm">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                Copy
            </button>
        </div>

        <!-- Adjust panel -->
        <div id="adjust-panel" class="adjust-panel">
            <input type="text" id="adjust-input" placeholder="e.g. Make it shorter, add the gate code, be more formal…">
            <button id="btn-adjust-apply" onclick="doApplyAdjust()" class="btn btn-primary btn-sm">Apply</button>
        </div>

        <!-- Paste fallback (hidden unless capture fails) -->
        <div id="paste-fallback" class="paste-fallback">
            <button id="paste-toggle" class="paste-toggle" onclick="togglePasteFallback()">or paste conversation manually</button>
            <div class="paste-area">
                <textarea id="paste-textarea" placeholder="Paste the last guest message here…"></textarea>
                <button id="btn-paste-generate" onclick="doPasteGenerate()" class="btn btn-primary btn-sm">Generate from Paste</button>
            </div>
        </div>

        <!-- Details (debug) -->
        <details id="details-section" class="details-section">
            <summary>Details</summary>
            <div class="details-grid">
                <div class="details-block">
                    <h4>Conversation</h4>
                    <div id="details-conv" class="details-body"></div>
                </div>
                <div class="details-block">
                    <h4>Templates used</h4>
                    <div id="details-tpls" class="details-body"></div>
                </div>
                <div class="details-block">
                    <h4>Intent detected</h4>
                    <p id="details-intent" class="details-body"></p>
                </div>
                <div class="details-block">
                    <h4>Resort context</h4>
                    <div id="details-resort" class="details-body"></div>
                </div>
                <div class="details-block">
                    <h4>Writer prompt</h4>
                    <pre id="details-prompt" class="details-body details-prompt"></pre>
                </div>
            </div>
        </details>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
</body>

</html>
