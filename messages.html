<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Generator - Master Vacation Homes</title>

    <link rel="shortcut icon" href="img/MasterLogo.jpg" type="image/x-icon">

    <link rel="stylesheet" href="style/reset.css">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="style/message.css">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.3.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKYoUaxhOX1pagezUTTDbwWVg5ktcSEcY",
            authDomain: "templatemaster-a2d6e.firebaseapp.com",
            projectId: "templatemaster-a2d6e",
            storageBucket: "templatemaster-a2d6e.firebasestorage.app",
            messagingSenderId: "208432538664",
            appId: "1:208432538664:web:10a29a55efbb824ae1411d",
            measurementId: "G-LLVT6XW024"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);

        let userSignature = { enabled: false, mode: "fixed", text: "", randomList: [] };
        let allTemplates = [];

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById("user-email").innerText = user.email;
                await loadCategories(user.uid);
                await loadTemplates(user.uid);
                loadSignature(user.uid);
            } else {
                window.location.href = "index.html";
            }
        });

        async function loadSignature(userId) {
            try {
                const settingsRef = doc(db, "settings", userId);
                const snap = await getDoc(settingsRef);
                if (snap.exists()) {
                    const data = snap.data();
                    userSignature.enabled = data.signatureEnabled || false;
                    userSignature.mode = data.signatureMode || "fixed";
                    userSignature.text = data.signatureText || "";
                    userSignature.randomList = data.randomSignatures || [];
                }
            } catch (e) {
                console.error("Error loading signature:", e);
            }
        }

        async function loadCategories(userId) {
            try {
                const settingsRef = doc(db, "settings", userId);
                const snap = await getDoc(settingsRef);
                const select = document.getElementById("category-filter");

                select.innerHTML = '<option value="all">All</option>';

                if (snap.exists() && snap.data().categories) {
                    snap.data().categories.forEach(cat => {
                        const opt = document.createElement("option");
                        opt.value = cat;
                        opt.textContent = cat;
                        select.appendChild(opt);
                    });
                }

                // Add "Uncategorized" option
                const uncatOpt = document.createElement("option");
                uncatOpt.value = "__uncategorized__";
                uncatOpt.textContent = "Uncategorized";
                select.appendChild(uncatOpt);
            } catch (e) {
                console.error("Error loading categories:", e);
            }
        }

        async function loadTemplates(userId) {
            const userDocRef = doc(db, "templates", userId);
            const userTemplatesCollection = collection(userDocRef, "userTemplates");
            const querySnapshot = await getDocs(userTemplatesCollection);

            allTemplates = [];

            querySnapshot.forEach((docSnap) => {
                const data = docSnap.data();
                allTemplates.push({
                    id: docSnap.id,
                    name: data.name,
                    description: data.description.replace(/\\n/g, "\n"),
                    category: data.category || ""
                });
            });

            renderCheckboxes();
        }

        function renderCheckboxes() {
            const list = document.getElementById("checkbox-list");
            const categoryFilter = document.getElementById("category-filter").value;
            const textFilter = document.getElementById("filter-input").value.toLowerCase();

            list.innerHTML = "";

            allTemplates
                .filter(t => {
                    if (categoryFilter === "all") return true;
                    if (categoryFilter === "__uncategorized__") return !t.category;
                    return t.category === categoryFilter;
                })
                .filter(t => t.name.toLowerCase().includes(textFilter))
                .forEach(t => {
                    const label = document.createElement("label");
                    label.className = "checkbox-item";
                    label.innerHTML = `
                        <input type="checkbox" class="service" value="${t.id}" data-description="${t.description.replace(/"/g, '&quot;')}">
                        <span class="checkmark"></span>
                        <span class="checkbox-label" title="${t.name}">${t.name}</span>
                    `;
                    list.appendChild(label);
                });
        }

        window.filterByCategory = renderCheckboxes;
        window.filterServices = renderCheckboxes;

        function getSignatureText() {
            if (!userSignature.enabled) return "";
            if (userSignature.mode === "random" && userSignature.randomList.length > 0) {
                const i = Math.floor(Math.random() * userSignature.randomList.length);
                return userSignature.randomList[i];
            }
            return userSignature.text || "";
        }

        function getSelectedMessages() {
            let messages = [];
            document.querySelectorAll(".service:checked").forEach(service => {
                const description = service.getAttribute("data-description");
                if (description) messages.push(description);
            });
            return messages;
        }

        window.generateMessage = function () {
            const yourName = document.getElementById("yourName").value.trim();
            const guestName = document.getElementById("guestName").value.trim();

            if (!yourName) { showToast("Please enter your name.", "error"); return; }
            if (!guestName) { showToast("Please enter the guest's name.", "error"); return; }

            const messages = getSelectedMessages();
            const sig = getSignatureText();

            let finalMessage = `Hello ${guestName},\n\n`;
            if (messages.length > 0) finalMessage += messages.join("\n\n") + "\n\n";
            if (sig) finalMessage += sig + "\n";
            finalMessage += yourName;

            document.getElementById("generatedMessage").value = finalMessage;

            navigator.clipboard.writeText(finalMessage).then(() => {
                showToast("Message copied to clipboard!");
            }).catch(() => {
                showToast("Message generated. Copy it manually.", "error");
            });

            document.querySelectorAll(".service").forEach(cb => cb.checked = false);
        };

        window.copyRaw = function () {
            const yourName = document.getElementById("yourName").value.trim();

            if (!yourName) { showToast("Please enter your name.", "error"); return; }

            const messages = getSelectedMessages();
            if (messages.length === 0) { showToast("Select at least one template.", "error"); return; }

            const sig = getSignatureText();

            let raw = messages.join("\n\n") + "\n\n";
            if (sig) raw += sig + "\n";
            raw += yourName;

            document.getElementById("generatedMessage").value = raw;

            navigator.clipboard.writeText(raw).then(() => {
                showToast("Copied without greeting!");
            }).catch(() => {
                showToast("Failed to copy.", "error");
            });

            document.querySelectorAll(".service").forEach(cb => cb.checked = false);
        };

        function showToast(message, type = "success") {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.className = "toast " + type + " show";
            setTimeout(() => toast.classList.remove("show"), 2500);
        }
    </script>
</head>

<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-left">
            <a href="index.html" class="header-logo">
                <img src="img/MasterLogo.jpg" alt="Logo">
            </a>
            <nav class="header-nav">
                <a href="template.html" class="nav-link">Templates</a>
                <a href="messages.html" class="nav-link active">Messages</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="header-right">
            <span id="user-email" class="header-email"></span>
            <a href="index.html" class="btn btn-sm btn-outline">Home</a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="msg-main">
        <div class="msg-form">
            <div class="form-row">
                <div class="form-group">
                    <label for="yourName">Your Name</label>
                    <input type="text" id="yourName" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label for="guestName">Guest Name</label>
                    <input type="text" id="guestName" placeholder="Guest name">
                </div>
            </div>
        </div>

        <div class="services-section">
            <div class="services-header">
                <h3>Select Templates</h3>
                <div class="services-filters">
                    <select id="category-filter" class="category-select" onchange="filterByCategory()">
                        <option value="all">All</option>
                    </select>
                    <div class="filter-box">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input type="text" id="filter-input" placeholder="Filter..." oninput="filterServices()">
                    </div>
                </div>
            </div>
            <div id="checkbox-list" class="checkbox-list"></div>
        </div>

        <div class="btn-row">
            <button onclick="generateMessage()" class="btn btn-primary btn-full btn-generate">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                Generate Message
            </button>
            <button onclick="copyRaw()" class="btn btn-outline btn-copy-raw" title="Copy without guest greeting">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
        </div>

        <div class="msg-output">
            <label for="generatedMessage" class="output-label">Generated Message</label>
            <textarea id="generatedMessage" readonly placeholder="Your generated message will appear here..."></textarea>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast"></div>
</body>

</html>
